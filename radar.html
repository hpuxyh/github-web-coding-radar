<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="每天帮你找好项目，自动筛出 AI 前沿趋势、实用产品灵感和热门开源项目。"
    />
    <title>每天帮你找好项目 · 静态版</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f9f5;
        --panel: #ffffff;
        --panel-2: #f1f7f3;
        --ink: #1f2d28;
        --muted: #6c7d76;
        --line: rgba(24, 60, 44, 0.10);
        --blue: #2b9fd6;
        --green: #21b573;
        --amber: #d6912a;
        --red: #e05a4f;
        --shadow: 0 12px 32px rgba(31, 70, 50, 0.08);
        --radius: 14px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          radial-gradient(1100px 520px at 12% -8%, rgba(33, 181, 115, 0.12), transparent 60%),
          radial-gradient(900px 480px at 92% -6%, rgba(43, 159, 214, 0.12), transparent 60%),
          var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 42px;
      }

      .topbar {
        position: sticky;
        z-index: 10;
        top: 0;
        display: grid;
        grid-template-columns: minmax(220px, 1fr);
        gap: 16px;
        align-items: center;
        padding: 14px 0 18px;
        background: linear-gradient(180deg, rgba(243, 249, 245, 0.96), rgba(243, 249, 245, 0.72));
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--blue), var(--green));
        color: #0f1415;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 2.4vw, 2.2rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .metric {
        min-height: 96px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, #ffffff, #f3faf6);
        box-shadow: var(--shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .metric:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px rgba(31, 70, 50, 0.12);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .metric strong {
        display: block;
        margin-top: 7px;
        color: var(--ink);
        font-size: clamp(1.3rem, 2.5vw, 2rem);
        line-height: 1;
      }

      .metric small {
        display: block;
        margin-top: 7px;
        color: var(--muted);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: center;
        margin: 18px 0;
      }

      .search {
        position: relative;
      }

      .search input,
      select {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel);
        color: var(--ink);
        outline: 0;
        box-shadow: 0 1px 2px rgba(31, 70, 50, 0.05);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .search input:focus,
      select:focus {
        border-color: rgba(33, 181, 115, 0.6);
        box-shadow: 0 0 0 3px rgba(33, 181, 115, 0.14);
      }

      .search input {
        padding: 0 14px 0 42px;
      }

      .search span {
        position: absolute;
        left: 14px;
        top: 50%;
        color: var(--muted);
        transform: translateY(-50%);
      }

      select {
        min-width: 166px;
        padding: 0 12px;
      }

      .tabs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 1px 2px rgba(31, 70, 50, 0.05);
      }

      .tabs button {
        min-height: 34px;
        min-width: 92px;
        border: 0;
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-weight: 650;
        transition: background 0.18s ease, color 0.18s ease;
      }

      .tabs button:hover {
        background: rgba(33, 181, 115, 0.08);
        color: var(--ink);
      }

      .tabs button[aria-selected="true"] {
        background: linear-gradient(135deg, var(--green), var(--blue));
        color: #ffffff;
        font-weight: 800;
        box-shadow: 0 4px 12px rgba(33, 181, 115, 0.28);
      }

      .content-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .list,
      .side-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .list-header,
      .side-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .list-header h2,
      .side-header h2 {
        margin: 0;
        font-size: 1.02rem;
        line-height: 1.2;
      }

      .count {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .repo-list {
        display: grid;
      }

      .repo-row {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) auto;
        gap: 14px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        transition: background 0.16s ease;
      }

      .repo-row:hover {
        background: rgba(33, 181, 115, 0.045);
      }

      .repo-row:last-child {
        border-bottom: 0;
      }

      .rank {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: linear-gradient(135deg, rgba(33, 181, 115, 0.16), rgba(43, 159, 214, 0.16));
        color: #197a52;
        font-weight: 900;
      }

      .repo-main {
        min-width: 0;
      }

      .repo-title {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 0;
        font-size: 1rem;
      }

      .repo-title a {
        color: var(--ink);
        text-decoration: none;
        font-weight: 750;
      }

      .repo-title a:hover {
        color: var(--green);
      }

      .repo-name {
        color: var(--ink);
        font-weight: 800;
        font-size: 1.04rem;
      }

      .badge {
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(33, 181, 115, 0.12);
        color: #157a4d;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .description {
        margin: 8px 0 0;
        color: #41524b;
        line-height: 1.56;
      }

      .reason {
        margin: 9px 0 0;
        padding: 8px 12px;
        border-left: 3px solid var(--green);
        border-radius: 0 10px 10px 0;
        background: rgba(33, 181, 115, 0.07);
        color: #2c6f4e;
        line-height: 1.55;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .detail-item {
        padding: 12px;
        border: 1px solid rgba(43, 159, 214, 0.2);
        border-radius: 11px;
        background: rgba(43, 159, 214, 0.06);
      }

      .detail-item strong {
        display: block;
        margin-bottom: 7px;
        color: #1d6f97;
        font-size: 0.82rem;
      }

      .detail-item p {
        margin: 0;
        color: #44544c;
        line-height: 1.55;
        font-size: 0.86rem;
      }

      .usage-details {
        margin-top: 12px;
        border: 1px solid rgba(33, 181, 115, 0.24);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.04);
        overflow: hidden;
      }

      .usage-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        list-style: none;
        cursor: pointer;
        color: #147a54;
        font-size: 0.92rem;
        font-weight: 850;
      }

      .usage-summary::-webkit-details-marker {
        display: none;
      }

      .usage-summary::after {
        content: "⌄";
        flex: 0 0 auto;
        font-size: 1.1rem;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .usage-details[open] .usage-summary::after {
        transform: rotate(180deg);
      }

      .usage-details[open] .usage-summary {
        border-bottom: 1px solid rgba(33, 181, 115, 0.16);
      }

      .playbook {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 0;
        padding: 10px;
      }

      .playbook-block {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel-2);
      }

      .playbook-block h4 {
        margin: 0 0 8px;
        color: var(--ink);
        font-size: 0.82rem;
        line-height: 1.2;
      }

      .playbook-block ul,
      .playbook-block ol {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
        color: #4a5a52;
        line-height: 1.5;
        font-size: 0.84rem;
      }

      .example {
        margin: 10px 0 0;
        border: 1px solid rgba(33, 181, 115, 0.28);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.05);
        overflow: hidden;
      }

      .example-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .example-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(33, 181, 115, 0.2);
        color: #1f7a52;
        font-weight: 700;
        font-size: 0.88rem;
      }

      .example-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .example-tag {
        padding: 1px 9px;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-size: 0.74rem;
        font-weight: 800;
      }

      .example p {
        margin: 0;
        padding: 11px 13px;
        color: #3a4a43;
        line-height: 1.6;
        font-size: 0.88rem;
      }

      .example-media {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        padding: 12px 13px 2px;
      }

      .example-media figure {
        margin: 0;
        border: 1px solid rgba(33, 181, 115, 0.16);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        overflow: hidden;
      }

      .example-media img {
        display: block;
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        background: #ffffff;
      }

      .example-media figcaption {
        padding: 7px 9px;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1.35;
      }

      .generated-example {
        margin: 12px 13px 2px;
        border: 1px solid rgba(43, 159, 214, 0.18);
        border-radius: 12px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(241, 247, 243, 0.92)),
          radial-gradient(circle at 18% 12%, rgba(33, 181, 115, 0.18), transparent 32%),
          radial-gradient(circle at 88% 18%, rgba(43, 159, 214, 0.18), transparent 34%);
        overflow: hidden;
      }

      .generated-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(43, 159, 214, 0.12);
      }

      .generated-title {
        color: var(--ink);
        font-weight: 850;
        font-size: 0.88rem;
      }

      .generated-label {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 2px 8px;
        background: rgba(43, 159, 214, 0.12);
        color: #216f97;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .generated-canvas {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
        gap: 10px;
        align-items: stretch;
        padding: 12px;
      }

      .generated-panel {
        min-height: 112px;
        padding: 11px;
        border: 1px solid rgba(24, 60, 44, 0.1);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 8px 18px rgba(31, 70, 50, 0.07);
      }

      .generated-panel strong {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.74rem;
      }

      .generated-panel span {
        display: block;
        color: #263c32;
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .generated-arrow {
        display: grid;
        place-items: center;
        color: #1f7a52;
        font-weight: 950;
      }

      .generated-output-lines {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .generated-output-lines i {
        display: block;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(33, 181, 115, 0.45), rgba(43, 159, 214, 0.32));
      }

      .generated-output-lines i:nth-child(2) {
        width: 78%;
      }

      .generated-output-lines i:nth-child(3) {
        width: 56%;
      }

      @media (max-width: 680px) {
        .generated-canvas {
          grid-template-columns: 1fr;
        }

        .generated-arrow {
          min-height: 18px;
          transform: rotate(90deg);
        }
      }

      .example pre {
        margin: 0;
        padding: 11px 13px 12px;
        border-top: 1px solid rgba(33, 181, 115, 0.14);
        background: rgba(255, 255, 255, 0.74);
        color: #23342d;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.8rem;
        line-height: 1.5;
      }

      .example code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .edge {
        margin: 12px 0 0;
        padding: 12px 14px;
        border: 1px solid rgba(214, 145, 42, 0.28);
        border-left: 4px solid var(--amber);
        border-radius: 11px;
        background: rgba(214, 145, 42, 0.06);
      }

      .edge h4 {
        margin: 0 0 8px;
        color: #9a6614;
        font-size: 0.88rem;
        line-height: 1.3;
      }

      .edge ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
        color: #6a5326;
        line-height: 1.55;
        font-size: 0.86rem;
      }

      .meta,
      .features {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 10px;
      }

      .meta span,
      .features span {
        min-height: 26px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 0.78rem;
      }

      .meta span {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--muted);
      }

      .features span {
        background: rgba(214, 145, 42, 0.13);
        color: #9a6614;
      }

      .repo-score {
        display: grid;
        gap: 8px;
        justify-items: end;
        align-content: start;
        align-items: start;
        min-width: 96px;
      }

      .score {
        text-align: right;
      }

      .score strong {
        display: block;
        color: var(--ink);
        font-size: 1.05rem;
      }

      .score span {
        color: var(--muted);
        font-size: 0.76rem;
      }

      .small-link {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        border: 1px solid rgba(33, 181, 115, 0.4);
        border-radius: 999px;
        color: #157a4d;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 800;
        transition: background 0.18s ease;
      }

      .small-link:hover {
        background: rgba(33, 181, 115, 0.12);
      }

      .side-panel {
        display: none;
        position: sticky;
        top: 104px;
      }

      .draft-list {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .draft {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel-2);
        overflow: hidden;
      }

      .draft button {
        width: 100%;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        text-align: left;
        cursor: pointer;
        transition: background 0.16s ease;
      }

      .draft button:hover {
        background: rgba(33, 181, 115, 0.07);
      }

      .draft button strong {
        overflow-wrap: anywhere;
      }

      .draft pre {
        max-height: 420px;
        margin: 0;
        padding: 12px;
        overflow: auto;
        color: #3a4a43;
        font: 0.82rem/1.58 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      .empty,
      .error {
        padding: 28px;
        color: var(--muted);
        line-height: 1.7;
      }

      .error {
        border: 1px solid rgba(224, 90, 79, 0.34);
        border-radius: 11px;
        background: rgba(224, 90, 79, 0.08);
        color: #b23a2f;
      }

      @media (max-width: 1080px) {
        .summary-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .content-layout {
          grid-template-columns: 1fr;
        }

        .side-panel {
          position: static;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 22px, 1440px);
          padding-top: 12px;
        }

        .topbar {
          position: static;
          grid-template-columns: 1fr;
        }

        .summary-grid,
        .controls {
          grid-template-columns: 1fr;
        }

        .tabs {
          grid-auto-flow: row;
        }

        .tabs button {
          min-width: 100%;
        }

        .repo-row {
          grid-template-columns: 44px minmax(0, 1fr);
        }

        .repo-score {
          grid-column: 2;
          justify-items: start;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .playbook {
          grid-template-columns: 1fr;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .score {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">榜</div>
          <div>
            <h1>每天帮你找好项目</h1>
            <p class="subtitle" id="subtitle">静态版已内置数据，打开 HTML 即可浏览。</p>
          </div>
        </div>
      </header>

      <section class="summary-grid" id="summary" aria-label="今日概览"></section>

      <section class="controls" aria-label="筛选控制">
        <label class="search">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="搜索用途、适合人群、关键词" autocomplete="off" />
        </label>
        <select id="sortSelect" aria-label="排序">
          <option value="rank">按榜单排序</option>
          <option value="stars">按收藏数排序</option>
          <option value="velocity">按变火速度排序</option>
          <option value="recent">按最近更新排序</option>
        </select>
        <div class="tabs" role="tablist" aria-label="榜单切换">
          <button type="button" role="tab" aria-selected="true" data-tab="frontier">大佬在看</button>
          <button type="button" role="tab" aria-selected="false" data-tab="product_ideas">产品灵感</button>
          <button type="button" role="tab" aria-selected="false" data-tab="rising">正在变火</button>
          <button type="button" role="tab" aria-selected="false" data-tab="all_time">经典项目</button>
          <button type="button" role="tab" aria-selected="false" data-tab="drafts" style="display: none">发帖草稿</button>
        </div>
      </section>

      <section class="content-layout">
        <section class="list" aria-live="polite">
          <div class="list-header">
            <h2 id="listTitle">大佬在看榜</h2>
            <span class="count" id="resultCount">0 个项目</span>
          </div>
          <div class="repo-list" id="repoList"></div>
        </section>

        <aside class="side-panel">

里的判断、流程、状态和隐喻，变成一张张白底、手绘、怪诞但清爽的正文配图。 16:9 横版 | 小黑 IP | 纯白手绘 | 少量红橙蓝中文批注 | Codex Skill 这个仓库是什么 Ian Xiaohei Illustrations 是一个 Codex Skill，用来指导 AI Agent 为中文文章、帖子、博客、Notion 文档和方法论内容生成正文配图。 它不是通用插画 prompt，也不是 PPT 信息图模板。它的核心目标是：先理解文章里的认知锚点，再把其中一个判断、流程、结构、状态或隐喻，变成一张有记忆点的 16:9 手绘解释图。 默认视觉 IP 是“小黑”：一个黑色实心、白点眼、细腿、空表情的小角色。小黑不是吉祥物，不是贴纸，也不是站在角落里的装饰物，而是正在认真参与系统运转的荒诞工作者。 一句话：**让 AI 不只是“配一张图”，而是把文章里的一个关键认知动作画出来。** 适合谁用 特别适合： 写中文文章，需要正文配图和文章插图的人 做知识型内容、方法论内容、AI 工作流内容的人 想把抽象判断画成具体隐喻的人 想要一种比 PPT 信息图更轻、更怪、更有个人识别度的配图风格的人 用 Codex 做内容生产，希望稳定复用一套视觉语言的人 不适合： 想要商业插画、品牌 KV 或精致扁平插画的人 想要传统 PPT 信息图、复杂架构图或流程图的人 想要儿童卡通、可爱 IP、表情包风格的人 想把大量正文、长段解释或完整课程页塞进一张图里的人 需要严格可编辑矢量源文件的人 它会产出什么 默认输出： 16:9 横","examples":[{"title":"示例效果","body":"这些图片是风格校准样例，不是构图模板。使用时应该从当前文章重新发明隐喻，不要照抄旧案例的物件和构图。 ---","code":"","images":[{"url":"https://raw.githubusercontent.com/helloianneo/ian-xiaohei-illustrations/main/examples/images/01-two-breakpoints.png","alt":"两个断点"},{"url":"https://raw.githubusercontent.com/helloianneo/ian-xiaohei-illustrations/main/examples/images/02-sort-by-purpose.png","alt":"按目的分拣"}],"source":"README"}],"features":[],"scores":{"all_time":2637.75,"rising":395.44,"frontier":483.84,"product":431.73},"notes":[],"age_days":10,"star_velocity":230.1,"delta_stars":null,"delta_days":null,"delta_per_day":0.0,"lens":{"frontier_hits":["agent","codex"],"product_hits":["notion"],"frontier_reason":"命中 开发者关注度，适合观察前沿团队正在围绕哪些工具链和能力下注。","product_reason":"命中 notion，适合拆成可使用、可演示、可复刻的产品点子。"}},{"id":1218208502,"full_name":"worldwonderer/oh-story-claudecode","name":"oh-story-claudecode","owner":"worldwonderer","html_url":"https://github.com/worldwonderer/oh-story-claudecode","default_branch":"main","description":"网文/小说写作 skill 包，覆盖长篇与短篇网络小说的扫榜、拆文、写作、去AI味、封面图全流程","language":"JavaScript","stars":2000,"forks":380,"watchers":2000,"open_issues":5,"topics":["ai-agent","ai-writing","chinese-novel","claude-code","claude-skills","creative-writing","novel-writing","openclaw","skill","web-novel","writing-assistant"],"homepage":"","license       function featureBasedName(repo) {
        const features = repo.features || [];
        if (features.includes('Low-code / No-code')) return '不用写代码的搭应用工具';
        if (features.includes('Web IDE / Browser Editor')) return '网页里的写代码工具';
        if (features.includes('Sandbox / Preview')) return '代码运行和预览工具';
        if (features.includes('MCP / Tool Calling')) return 'AI 工具连接器';
        if (features.includes('AI Coding / Agent')) return 'AI 编程助手';
        if (features.includes('Deploy / Cloud')) return '一键发布工具';
        if (features.includes('Testing / Quality')) return '代码检查工具';
        return '值得看看的一款工具';
      }

      function cleanFriendlyName(value) {
        return String(value || '')
          .replace(/^这是?一个/, '')
          .replace(/^这是?一套/, '')
          .replace(/^这是?一本/, '')
          .replace(/^一个/, '')
          .replace(/^一套/, '')
          .replace(/^一本/, '')
          .replace(/[。.!！；;：:].*$/, '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function displayProjectName(repo) {
        if (friendlyProjectNameText[repo.full_name]) return friendlyProjectNameText[repo.full_name];
        const details = projectDetails(repo);
        const fromDetails = cleanFriendlyName(details.what);
        if (fromDetails && /[\u4e00-\u9fff]/.test(fromDetails)) {
          return fromDetails.length > 18 ? `${fromDetails.slice(0, 18)}…` : fromDetails;
        }
        return featureBasedName(repo);
      }

      function normalizeExampleEntry(entry) {
        if (!entry) return null;
        if (typeof entry === 'string') {
          return { title: '举个例子', body: entry, code: '', images: [], source: '简化示例' };
        }
        const title = String(entry.title || entry.name || '项目里的示例').trim();
        const body = String(entry.body || entry.text || entry.description || '').trim();
        const code = String(entry.code || '').trim();
        const images = Array.isArray(entry.images)
          ? entry.images
              .map((image) => ({
                url: String(image?.url || '').trim(),
                alt: String(image?.alt || '项目示例图').trim(),
              }))
              .filter((image) => image.url)
              .slice(0, 2)
          : [];
        const source = String(entry.source || 'README').trim();
        if (!body && !code && !images.length) return null;
        return { title, body, code, images, source };
      }

      function repoExamples(repo) {
        const extracted = Array.isArray(repo.examples)
          ? repo.examples.map(normalizeExampleEntry).filter(Boolean)
          : [];
        const manual = normalizeExampleEntry(projectExampleText[repo.full_name]);
        const combined = [];
        if (manual) {
          if (!manual.images.length && extracted[0]?.images?.length) {
            manual.images = extracted[0].images;
          }
          combined.push(manual);
        }
        for (const example of extracted) {
          const repeated = combined.some(
            (item) =>
              item.body === example.body ||
              (item.code && item.code === example.code) ||
              (item.images?.[0]?.url && item.images[0].url === example.images?.[0]?.url),
          );
          if (!repeated) combined.push(example);
        }
        if (!combined.length) {
          const details = projectDetails(repo);
          const playbook = repoPlaybook(repo);
          combined.push({
            title: '可能的使用场景',
            body: playbook.scenarios?.[0] || details.canDo || '这个项目适合先看用途，再判断能不能用到自己的工作里。',
            code: '',
            images: [],
            source: '生成示意',
          });
        }
        return combined.slice(0, 1);
      }

      function generatedVisualText(repo, example) {
        const details = projectDetails(repo);
        const playbook = repoPlaybook(repo);
        const features = repo.features || [];
        const firstScenario = playbook.scenarios?.[0] || details.canDo || '把一个想法交给工具处理。';
        const firstStep = playbook.steps?.[0] || '输入你的目标或素材。';
        const output = details.canDo || example.body || '得到一个可以继续修改或使用的结果。';

        let title = '生成示意图';
        let input = firstStep;
        let process = '工具根据你的目标自动处理。';
        if (features.includes('AI Coding / Agent')) {
          title = 'AI 写代码流程示意';
          input = '输入需求、报错或项目目标';
          process = 'AI 读取项目、拆任务、改代码';
        } else if (features.includes('Web IDE / Browser Editor')) {
          title = '网页里做项目示意';
          input = '打开网页工作台并输入需求';
          process = '在线编辑、预览、继续修改';
        } else if (features.includes('Sandbox / Preview')) {
          title = '运行预览流程示意';
          input = '放入代码或让 AI 生成代码';
          process = '在隔离环境里运行和看日志';
        } else if (features.includes('MCP / Tool Calling')) {
          title = 'AI 调工具流程示意';
          input = '告诉 AI 要完成的任务';
          process = 'AI 调用外部工具拿数据或执行动作';
        } else if (features.includes('Low-code / No-code')) {
          title = '低代码搭应用示意';
          input = '选择模板、表单或数据源';
          process = '拖拽组件并配置自动流程';
        }

        return {
          title,
          input: input.slice(0, 38),
          process,
          output: output.slice(0, 52),
          scenario: firstScenario.slice(0, 48),
        };
      }

      function renderGeneratedVisual(repo, example) {
        const visual = generatedVisualText(repo, example);
        return `
          <div class="generated-example" role="img" aria-label="${escapeHtml(visual.title)}">
            <div class="generated-top">
              <span class="generated-title">${escapeHtml(visual.title)}</span>
              <span class="generated-label">生成示意图 · 非原项目截图</span>
            </div>
            <div class="generated-canvas">
              <section class="generated-panel">
                <strong>输入 / 操作</strong>
                <span>${escapeHtml(visual.input)}</span>
              </section>
              <div class="generated-arrow">→</div>
              <section class="generated-panel">
                <strong>可能看到的结果</strong>
                <span>${escapeHtml(visual.output)}</span>
                <div class="generated-output-lines" aria-hidden="true">
                  <i></i><i></i><i></i>
                </div>
              </section>
            </div>
          </div>
        `;
      }

      function renderExampleBlocks(repo) {
        const examples = repoExamples(repo);
        if (!examples.length) return '';
        const example = examples[0];
        const hasRealImages = Boolean(example.images?.length);
        return `
          <div class="example-list">
            <section class="example">
              <div class="example-header">
                <span class="example-tag">项目示例</span>
                <span class="example-title">${escapeHtml(example.title || '具体用法')}</span>
              </div>
              ${
                example.images?.length
                  ? `<div class="example-media">
                      ${example.images
                        .map(
                          (image) => `
                            <figure>
                              <img src="${escapeHtml(image.url)}" alt="${escapeHtml(image.alt || '项目示例图')}" loading="eager" decoding="async" referrerpolicy="no-referrer" onerror="this.closest('figure').hidden = true" />
                              <figcaption>${escapeHtml(image.alt || '项目示例图')}</figcaption>
                            </figure>
                          `,
                        )
                        .join('')}
                    </div>`
                  : ''
              }
              ${!hasRealImages && !example.images?.length ? renderGeneratedVisual(repo, example) : ''}
              ${example.body ? `<p>${escapeHtml(example.body)}</p>` : ''}
              ${example.code ? `<pre><code>${escapeHtml(example.code)}</code></pre>` : ''}
            </section>
          </div>
        `;
      }

      function collectDrafts(data) {
        return (data.xhs_repos || []).map((repo, index) => {
          const features = repo.features?.length ? repo.features.map((feature) => stripEmoji(toChineseFeature(feature))) : ['开发者效率'];
          const intro = stripEmoji(toChineseIntro(repo));
          const friendlyName = stripEmoji(displayProjectName(repo));
          const delta =
            repo.delta_stars === null || repo.delta_stars === undefined
              ? ''
              : `，最近 ${repo.delta_days} 天新增 ${repo.delta_stars} 个收藏`;
          const featureLines = features.slice(0, 4).map((feature) => `- ${feature}`).join('\n');
          return {
            title: `${friendlyName}：好用工具选题`,
            text: `封面文案：${friendlyName}｜${features[0]}\n\n开头：\n今天刷到一个开源项目「${friendlyName}」，适合关注 AI 工具和效率工具的朋友收藏。\n\n它是干什么的：\n${intro}\n\n核心功能：\n${featureLines}\n\n为什么现在值得看：\n目前 ${compact(repo.stars)} 个收藏，创建于 ${shortDate(repo.created_at)}，最近仍有更新${delta}。\n\n项目链接：\n${repo.html_url}\n\n标签：\n#开源项目 #AI工具 #效率工具 #程序员工具 #开发者工具`,
            repo,
            index: index + 1,
          };
        });
      }

      function rankingReason(repo, tabName = state.activeTab) {
        const features = repo.features?.length ? repo.features.map(toChineseFeature) : ['开发者效率'];
        if (tabName === 'frontier') {
          return `为什么值得看：它和「${features.slice(0, 2).join('、')}」有关。简单说，这类项目通常是 AI 圈和技术圈比较早开始研究的方向。`;
        }
        if (tabName === 'product_ideas' || tabName === 'drafts') {
          return `为什么值得看：它不只是技术演示，更像一个可以拿来用、拿来改、拿来做内容的产品点子。`;
        }
        if (tabName === 'rising') {
          return '为什么值得看：它最近涨得比较快，说明可能正在被更多人发现。';
        }
        return '为什么值得看：收藏的人很多，说明它已经被大量开发者验证过，适合当成经典案例来学习。';
      }

      function heatBadge(repo, tabName = state.activeTab) {
        if (tabName === 'frontier') return '早期信号';
        if (tabName === 'product_ideas' || tabName === 'drafts') return '产品灵感';
        if (tabName === 'all_time') return '经典之作';
        return '正在变火';
      }

      // 把更新时间说成人话：最近更新过就标“还在更新”，否则给一个大概时间。
      function freshnessText(repo) {
        if (!repo.pushed_at) return '更新时间未知';
        const days = Math.floor((Date.now() - new Date(repo.pushed_at).getTime()) / 86400000);
        if (days <= 14) return '最近还在更新';
        if (days <= 60) return '近期有更新';
        const ym = String(repo.pushed_at).slice(0, 7);
        return `最近更新 ${ym}`;
      }

      function renderSummary(data) {
        const allRepos = data.all_repos || [];
        const rankings = exclusiveRankings(data);
        const frontier = rankings.frontier;
        const productIdeas = rankings.product_ideas;
        const rising = rankings.rising;
        const allTime = rankings.all_time;
        const drafts = data.xhs_repos || [];
        const topStars = Math.max(0, ...allRepos.map((repo) => Number(repo.stars || 0)));
        const featureSet = new Set(allRepos.flatMap((repo) => repo.features || []));
        const latestPush = allRepos
          .map((repo) => repo.pushed_at)
          .filter(Boolean)
          .sort()
          .at(-1);

        summary.innerHTML = [
          ['日报日期', data.date || '未知', '今天的数据'],
          ['候选项目', allRepos.length, '从 GitHub 找到的'],
          ['大佬在看', frontier.length, 'AI 圈早期信号'],
          ['产品灵感', productIdeas.length, '能拿来用或改造'],
          ['正在变火', rising.length, '最近涨得快'],
          ['经典项目', allTime.length, `最高 ${compact(topStars)} 个收藏`],
          ['草稿', drafts.length, `${featureSet.size} 类工具类型`],
        ]
          .map(
            ([label, value, note]) => `
              <article class="metric">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(value)}</strong>
                <small>${escapeHtml(note)}</small>
              </article>
            `,
          )
          .join('');

        subtitle.textContent = `日报日期 ${data.date || '未知'} · 最近项目更新 ${shortDate(latestPush)}`;
      }

      function exclusiveRankings(data) {
        const seen = new Set();
        const take = (repos = []) =>
          repos.filter((repo) => {
            const key = repo.full_name || repo.html_url || repo.name;
            if (!key) return true;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });

        return {
          frontier: take(data.frontier || []),
          product_ideas: take(data.product_ideas || []),
          rising: take(data.rising || []),
          all_time: take(data.all_time || []),
        };
      }

      function getReposForTab() {
        if (!state.data) return [];
        const rankings = exclusiveRankings(state.data);
        if (state.activeTab === 'frontier') return rankings.frontier;
        if (state.activeTab === 'product_ideas') return rankings.product_ideas;
        if (state.activeTab === 'all_time') return rankings.all_time;
        if (state.activeTab === 'drafts') return state.data.xhs_repos || [];
        return rankings.rising;
      }

      function repoSearchText(repo) {
        const details = projectDetails(repo);
        return [
          displayProjectName(repo),
          repo.full_name,
          toChineseIntro(repo),
          details.what,
          details.canDo,
          details.who,
          ...repoExamples(repo).flatMap((example) => [
            example.title,
            example.body,
            example.code,
            ...(example.images || []).map((image) => image.alt),
          ]),
          repo.language,
          repo.license,
          rankingReason(repo),
          ...(repo.features || []).map(toChineseFeature),
          ...(repo.features || []),
          ...(repo.topics || []),
        ]
          .join(' ')
          .toLowerCase();
      }

      function sortedRepos(repos) {
        const withRank = repos.map((repo, index) => ({ ...repo, _rank: index + 1 }));
        const filtered = withRank.filter((repo) => repoSearchText(repo).includes(state.query));
        if (state.sort === 'stars') {
          return filtered.sort((a, b) => Number(b.stars || 0) - Number(a.stars || 0));
        }
        if (state.sort === 'velocity') {
          return filtered.sort((a, b) => Number(b.star_velocity || 0) - Number(a.star_velocity || 0));
        }
        if (state.sort === 'recent') {
          return filtered.sort((a, b) => String(b.pushed_at || '').localeCompare(String(a.pushed_at || '')));
        }
        return filtered.sort((a, b) => a._rank - b._rank);
      }

      function renderRepos() {
        const repos = sortedRepos(getReposForTab());
        const titleMap = {
          frontier: '大佬在看榜',
          product_ideas: '产品灵感榜',
          rising: '正在变火榜',
          all_time: '经典项目榜',
          drafts: '发帖草稿关联项目',
        };
        listTitle.textContent = titleMap[state.activeTab];
        resultCount.textContent = `${repos.length} 个项目`;

        if (!repos.length) {
          repoList.innerHTML = '<div class="empty">没有匹配的项目。</div>';
          return;
        }

        repoList.innerHTML = repos
          .map((repo) => {
            const features = repo.features?.length ? repo.features.map(toChineseFeature) : ['待确认'];
            const playbook = repoPlaybook(repo);
            const details = projectDetails(repo);
            const edge = projectEdgeText[repo.full_name];
            const friendlyName = displayProjectName(repo);
            return `
              <article class="repo-row">
                <div class="rank">${String(repo._rank).padStart(2, '0')}</div>
                <div class="repo-main">
                  <h3 class="repo-title">
                    <span class="repo-name">${escapeHtml(friendlyName || `项目 ${repo._rank}`)}</span>
                    <span class="badge">${escapeHtml(heatBadge(repo))}</span>
                  </h3>
                  <p class="description">${escapeHtml(toChineseIntro(repo))}</p>
                  ${renderExampleBlocks(repo)}
                  <div class="detail-grid">
                    <section class="detail-item">
                      <strong>这是什么</strong>
                      <p>${escapeHtml(details.what)}</p>
                    </section>
                    <section class="detail-item">
                      <strong>能帮你做什么</strong>
                      <p>${escapeHtml(details.canDo)}</p>
                    </section>
                    <section class="detail-item">
                      <strong>适合谁</strong>
                      <p>${escapeHtml(details.who)}</p>
                    </section>
                  </div>
                  <details class="usage-details">
                    <summary class="usage-summary">点开看具体怎么用</summary>
                    <div class="playbook">
                      <section class="playbook-block">
                        <h4>可以怎么用</h4>
                        <ul>
                          ${playbook.scenarios.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                        </ul>
                      </section>
                      <section class="playbook-block">
                        <h4>上手步骤</h4>
                        <ol>
                          ${playbook.steps.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                        </ol>
                      </section>
                    </div>
                  </details>
                  ${edge ? `<section class="edge">
                    <h4>它强在哪？为什么 Codex、Claude Code 替不了</h4>
                    <ul>${edge.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
                  </section>` : ''}
                  <div class="features">
                    ${features.map((feature) => `<span>${escapeHtml(feature)}</span>`).join('')}
                  </div>
                  <div class="meta">
                    <span>${compact(repo.stars)} 人收藏</span>
                    <span>${escapeHtml(freshnessText(repo))}</span>
                  </div>
                </div>
                <div class="repo-score">
                  <a class="small-link" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noreferrer">去看看 ↗</a>
                </div>
              </article>
            `;
          })
          .join('');
      }

      function renderDrafts() {
        const drafts = collectDrafts(state.data || {});
        draftCount.textContent = `${drafts.length} 篇`;
        if (!drafts.length) {
          draftList.innerHTML = '<div class="empty">暂无草稿。</div>';
          return;
        }

        draftList.innerHTML = drafts
          .map(
            (draft) => `
              <article class="draft">
                <button type="button" data-copy="${draft.index}" title="复制草稿">
                  <strong>${escapeHtml(draft.index)}. ${escapeHtml(draft.title)}</strong>
                  <span>复制</span>
                </button>
                <pre>${escapeHtml(draft.text)}</pre>
              </article>
            `,
          )
          .join('');
      }

      function render() {
        if (!state.data) return;
        renderSummary(state.data);
        renderRepos();
        renderDrafts();
      }

      function loadData() {
        repoList.innerHTML = '<div class="empty">正在读取内置数据...</div>';
        try {
          const embeddedData = document.getElementById('embedded-radar-data');
          if (!embeddedData) throw new Error('缺少内置数据');
          state.data = JSON.parse(embeddedData.textContent);
          render();
        } catch (error) {
          summary.innerHTML = '';
          subtitle.textContent = '静态数据读取失败';
          repoList.innerHTML = `
            <div class="error">
              这个静态 HTML 里的内置数据读取失败：${escapeHtml(error.message)}<br />
              请重新生成 radar.html，或检查文件是否被截断。
            </div>
          `;
          draftList.innerHTML = '<div class="empty">暂无草稿。</div>';
        }
      }

      document.querySelectorAll('.tabs button').forEach((button) => {
        button.addEventListener('click', () => {
          state.activeTab = button.dataset.tab;
          document.querySelectorAll('.tabs button').forEach((item) => {
            item.setAttribute('aria-selected', String(item === button));
          });
          renderRepos();
        });
      });

      $('#searchInput').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        renderRepos();
      });

      $('#sortSelect').addEventListener('change', (event) => {
        state.sort = event.target.value;
        renderRepos();
      });

      draftList.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-copy]');
        if (!button) return;
        const drafts = collectDrafts(state.data || {});
        const draft = drafts.find((item) => String(item.index) === button.dataset.copy);
        if (!draft) return;
        await navigator.clipboard.writeText(draft.text);
        const oldText = button.querySelector('span').textContent;
        button.querySelector('span').textContent = '已复制';
        setTimeout(() => {
          button.querySelector('span').textContent = oldText;
        }, 1200);
      });

      loadData();
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="在网页里直接修改模板内容，实时预览自己的作品。"
    />
    <title>直接修改我的作品</title>
    <style>
      :root {
        color: #172033;
        background: #f7fbff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: #f4f7fa;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 14px;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #ffffff;
        color: #1d2a3b;
        font-weight: 850;
        box-shadow: none;
      }

      .button.primary {
        border-color: #172033;
        background: #172033;
        color: #ffffff;
      }

      .button.subtle {
        background: #f8fafc;
      }

      .button:hover {
        border-color: #b9c5d4;
        background: #f7f9fb;
      }

      .shell {
        width: min(1500px, 100%);
        margin: 0 auto;
        padding: 18px 24px;
      }

      h2,
      h3,
      p {
        margin: 0;
      }

      .editor-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 440px);
        gap: 16px;
        align-items: start;
      }

      .edit-panel,
      .preview-panel {
        border: 1px solid #dfe5ec;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(31, 45, 64, 0.06);
      }

      .edit-panel {
        max-height: calc(100vh - 36px);
        overflow: auto;
      }

      .panel-head {
        padding: 16px 18px;
        border-bottom: 1px solid #e6ebf0;
      }

      .panel-head h2 {
        color: #172033;
        font-size: 1.18rem;
        line-height: 1.35;
      }

      .panel-head p {
        margin-top: 6px;
        color: #607084;
        font-size: 0.92rem;
        line-height: 1.58;
      }

      .form-grid {
        display: grid;
        gap: 12px;
        padding: 16px 18px;
      }

      label,
      .field-label {
        display: grid;
        gap: 6px;
        color: #243044;
        font-size: 0.9rem;
        font-weight: 820;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
      }

      input,
      select {
        min-height: 40px;
        padding: 0 12px;
      }

      textarea {
        min-height: 82px;
        padding: 10px 12px;
        resize: vertical;
      }

      input[type="color"] {
        min-height: 44px;
        padding: 4px;
      }

      .item-group {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #e1e6ee;
        border-radius: 8px;
        background: #f8fafc;
      }

      .item-group h3 {
        color: #172033;
        font-size: 1rem;
      }

      .two-cols {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .form-actions {
        position: sticky;
        z-index: 3;
        bottom: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-top: 1px solid #e6ebf0;
        background: rgba(255, 255, 255, 0.96);
      }

      .notice {
        color: #607084;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .preview-panel {
        position: sticky;
        top: 18px;
        overflow: hidden;
      }

      .preview-frame {
        padding: 8px;
        background: #edf2f7;
      }

      .site-preview {
        height: calc(100vh - 128px);
        min-height: 660px;
        overflow: hidden;
        border: 1px solid #d9e1ea;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
      }

      .preview-hero {
        min-height: 280px;
        display: grid;
        align-content: end;
        gap: 16px;
        padding: 34px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.66)),
          url("assets/portfolio-hero.png");
        background-position: center;
        background-size: cover;
      }

      .preview-kicker {
        width: fit-content;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 12%, #ffffff);
        color: var(--accent, #1769c2);
        font-size: 0.78rem;
        font-weight: 850;
      }

      .preview-hero h2 {
        max-width: 720px;
        color: #172033;
        font-size: clamp(2rem, 4vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .preview-hero p {
        max-width: 680px;
        color: #526174;
        font-size: 1.04rem;
        line-height: 1.7;
      }

      .preview-cta {
        width: fit-content;
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
        font-weight: 850;
      }

      .preview-section {
        padding: 24px 34px 34px;
      }

      .preview-section h3 {
        color: #172033;
        font-size: 1.26rem;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .preview-card {
        min-height: 168px;
        padding: 16px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #ffffff;
      }

      .preview-card strong {
        display: block;
        color: #172033;
        font-size: 1.04rem;
        line-height: 1.35;
      }

      .preview-card span {
        display: block;
        margin-top: 8px;
        color: var(--accent, #1769c2);
        font-size: 0.82rem;
        font-weight: 850;
      }

      .preview-card p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.62;
      }

      .yuzhu-site {
        height: 100%;
        min-height: 660px;
        overflow: auto;
        padding: 18px;
        background:
          radial-gradient(circle at 18% 16%, rgba(188, 255, 196, 0.32), transparent 18%),
          radial-gradient(circle at 72% 10%, rgba(196, 188, 255, 0.28), transparent 16%),
          linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
        color: #222222;
        font-family:
          "Noto Sans SC", "Noto Sans JP", Inter, ui-sans-serif, system-ui,
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .yuzhu-stage {
        min-height: 780px;
        position: relative;
        display: grid;
        grid-template-columns: minmax(220px, 0.34fr) minmax(0, 0.66fr);
        overflow: hidden;
        border: 1px solid rgba(30, 42, 58, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 34px rgba(31, 45, 64, 0.16);
      }

      .yuzhu-bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .yuzhu-bubbles span {
        position: absolute;
        width: 22px;
        height: 22px;
        border: 2px solid rgba(31, 45, 64, 0.05);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        box-shadow: 0 2px 8px rgba(31, 45, 64, 0.08);
      }

      .yuzhu-bubbles span:nth-child(1) {
        top: 10%;
        left: 14%;
        background: rgba(195, 255, 194, 0.65);
      }

      .yuzhu-bubbles span:nth-child(2) {
        top: 18%;
        right: 23%;
        background: rgba(255, 196, 196, 0.64);
      }

      .yuzhu-bubbles span:nth-child(3) {
        top: 33%;
        left: 33%;
      }

      .yuzhu-bubbles span:nth-child(4) {
        top: 36%;
        right: 6%;
      }

      .yuzhu-bubbles span:nth-child(5) {
        top: 54%;
        left: 8%;
      }

      .yuzhu-bubbles span:nth-child(6) {
        top: 62%;
        right: 18%;
      }

      .yuzhu-bubbles span:nth-child(7) {
        bottom: 16%;
        left: 18%;
      }

      .yuzhu-bubbles span:nth-child(8) {
        bottom: 8%;
        right: 8%;
      }

      .yuzhu-sidebar {
        position: relative;
        z-index: 1;
        display: grid;
        align-content: start;
        justify-items: center;
        gap: 16px;
        min-height: 780px;
        padding: 92px 22px 36px;
        border-right: 1px solid rgba(31, 45, 64, 0.16);
        text-align: center;
      }

      .yuzhu-avatar {
        width: 132px;
        height: 132px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 0 18px rgba(31, 45, 64, 0.18);
      }

      .yuzhu-face {
        width: 68px;
        height: 68px;
        position: relative;
        border: 4px solid #111111;
        border-radius: 14px;
      }

      .yuzhu-face::before,
      .yuzhu-face::after {
        content: "";
        position: absolute;
        bottom: 11px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #111111;
      }

      .yuzhu-face::before {
        left: 22px;
      }

      .yuzhu-face::after {
        right: 14px;
      }

      .yuzhu-name {
        color: #000000;
        font-size: 1.1rem;
        font-weight: 900;
      }

      .yuzhu-say {
        color: #333333;
        font-size: 0.92rem;
        line-height: 1.7;
      }

      .yuzhu-socials {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 10px;
      }

      .yuzhu-social {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: #222222;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .yuzhu-social:hover {
        background: rgba(31, 45, 64, 0.08);
      }

      .yuzhu-player {
        width: min(220px, 100%);
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        margin-top: 20px;
        text-align: left;
      }

      .yuzhu-cover {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background:
          linear-gradient(135deg, rgba(9, 163, 255, 0.2), rgba(255, 112, 112, 0.3)),
          #f3f6fb;
        box-shadow: 0 4px 14px rgba(31, 45, 64, 0.14);
      }

      .yuzhu-track strong,
      .yuzhu-track span {
        display: block;
      }

      .yuzhu-track span {
        color: #7a8798;
        font-size: 0.82rem;
      }

      .yuzhu-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        grid-column: 2;
        color: #111111;
        font-weight: 900;
      }

      .yuzhu-play-button {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid rgba(31, 45, 64, 0.12);
        border-radius: 8px;
        background: #ffffff;
        color: #111111;
        font-weight: 900;
      }

      .yuzhu-play-button:hover {
        background: #f2f5f8;
      }

      .yuzhu-player.is-playing .yuzhu-cover {
        box-shadow:
          0 4px 14px rgba(31, 45, 64, 0.14),
          0 0 0 8px color-mix(in srgb, var(--accent, #09a3ff) 14%, transparent);
      }

      .yuzhu-main {
        position: relative;
        z-index: 1;
        min-width: 0;
        padding: 24px 42px 54px;
        text-align: center;
      }

      .yuzhu-nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 18px;
        color: #222222;
        font-size: 1rem;
        font-weight: 800;
      }

      .yuzhu-nav button {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #222222;
        cursor: pointer;
        font: inherit;
        font-weight: 850;
      }

      .yuzhu-nav button:hover,
      .yuzhu-nav button.is-active {
        background: #eeeeee;
      }

      .yuzhu-hero {
        min-height: 360px;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 18px;
        padding: 44px 0;
      }

      .yuzhu-kicker {
        color: var(--accent, #09a3ff);
        font-weight: 900;
      }

      .yuzhu-hero h2 {
        max-width: 760px;
        color: #000000;
        font-size: clamp(1.9rem, 4vw, 3.3rem);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .yuzhu-intro-lines {
        display: grid;
        gap: 8px;
        color: #333333;
        font-size: 1rem;
        line-height: 1.7;
      }

      .yuzhu-dot {
        color: #222222;
        font-size: 1.2rem;
      }

      .yuzhu-section,
      .yuzhu-contact {
        padding: 28px 0;
        scroll-margin-top: 16px;
      }

      .yuzhu-section h3,
      .yuzhu-contact h3 {
        color: #000000;
        font-size: clamp(1.45rem, 3vw, 2.3rem);
        line-height: 1.2;
      }

      .yuzhu-section-note {
        max-width: 560px;
        margin: 8px auto 0;
        color: #333333;
        line-height: 1.7;
      }

      .yuzhu-card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .yuzhu-card {
        min-height: 138px;
        padding: 16px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        text-align: left;
      }

      .yuzhu-card strong,
      .yuzhu-card span,
      .yuzhu-card p {
        display: block;
      }

      .yuzhu-card strong {
        color: #111111;
        font-size: 1rem;
      }

      .yuzhu-card span {
        margin-top: 8px;
        color: var(--accent, #09a3ff);
        font-size: 0.82rem;
        font-weight: 850;
      }

      .yuzhu-card p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.62;
      }

      .yuzhu-about {
        border-top: 1px solid rgba(31, 45, 64, 0.08);
        border-bottom: 1px solid rgba(31, 45, 64, 0.08);
      }

      .yuzhu-skills {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 14px;
      }

      .yuzhu-skills span {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: rgba(0, 153, 255, 0.1);
        color: var(--accent, #09a3ff);
        font-size: 0.82rem;
        font-weight: 850;
      }

      .yuzhu-contact {
        margin-top: 8px;
        padding: 22px;
        border-radius: 8px;
        background: rgba(9, 163, 255, 0.08);
      }

      .yuzhu-contact p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.7;
      }

      .choice-list {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .choice-row {
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 14px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #f8fbfd;
      }

      .choice-row b {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
      }

      .result-box {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid color-mix(in srgb, var(--accent, #1769c2) 24%, #ffffff);
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 8%, #ffffff);
      }

      .result-box strong {
        display: block;
        color: #172033;
      }

      .result-box p {
        margin-top: 8px;
        color: #526174;
        line-height: 1.62;
      }

      @supports not (color: color-mix(in srgb, #000 10%, #fff)) {
        .preview-kicker,
        .result-box {
          background: #eef7ff;
        }
      }

      @media (max-width: 1020px) {
        .editor-layout {
          grid-template-columns: 1fr;
        }

        .preview-panel {
          position: static;
        }

        .edit-panel {
          max-height: none;
          overflow: visible;
        }
      }

      @media (max-width: 680px) {
        .form-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }

        .shell {
          padding: 12px;
        }

        .panel-head,
        .form-grid,
        .preview-frame {
          padding: 16px;
        }

        .two-cols,
        .preview-grid,
        .yuzhu-card-grid {
          grid-template-columns: 1fr;
        }

        .yuzhu-stage {
          grid-template-columns: 1fr;
        }

        .yuzhu-sidebar {
          min-height: auto;
          padding: 36px 20px;
          border-right: 0;
          border-bottom: 1px solid rgba(31, 45, 64, 0.14);
        }

        .yuzhu-main {
          padding: 20px;
        }

        .preview-hero,
        .preview-section,
        .yuzhu-hero,
        .yuzhu-section,
        .yuzhu-contact {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="editor-layout">
        <section class="preview-panel" aria-labelledby="previewTitle">
          <div class="panel-head">
            <h2 id="previewTitle">预览我的作品</h2>
            <p id="previewHint">这里会跟着左边输入的内容一起变化。</p>
          </div>
          <div class="preview-frame">
            <div class="site-preview" id="preview"></div>
          </div>
        </section>

        <section class="edit-panel" aria-labelledby="editTitle">
          <div class="panel-head">
            <h2 id="editTitle">填写内容</h2>
            <p id="editHint">先把示例文字换成自己的内容。</p>
          </div>
          <form class="form-grid" id="editorForm"></form>
          <div class="form-actions">
            <button class="button primary" type="button" id="saveButton">保存</button>
            <a class="button" id="mineDemoButton" href="#">查看我的前端</a>
            <a class="button subtle" id="sampleDemoButton" href="#">看原站副本</a>
            <a class="button subtle" href="./remix-mvp.html#library">换模板</a>
            <button class="button" type="button" id="resetButton">清空重来</button>
            <span class="notice" id="saveNotice">还没有保存。</span>
          </div>
        </section>
      </section>
    </main>

    <script>
      const packCatalog = {
        'portfolio-page': [
          {
            title: '直接改雨竹upon的小站',
            kind: 'portfolio',
            helper: '直接把雨竹upon的小站换成你的名字、欢迎语、代表作、友链和联系方式。'
          },
          {
            title: '改成兴趣作品页',
            kind: 'list',
            helper: '适合把兴趣、作品、友链整理成卡片。'
          },
          {
            title: '改成项目导航页',
            kind: 'list',
            helper: '适合把做过的网页、小工具和文章放在一起。'
          }
        ],
        'ai-profile-page': [
          {
            title: '做一个 AI 个人主页',
            kind: 'portfolio',
            helper: '适合先改定位、介绍、作品和联系方式。'
          },
          {
            title: '改成接单服务页',
            kind: 'list',
            helper: '适合整理你能提供的服务和联系入口。'
          },
          {
            title: '改成内容账号主页',
            kind: 'list',
            helper: '适合整理公众号、视频号、播客或社群入口。'
          }
        ],
        'choice-tool': [
          {
            title: '改成餐厅选择器',
            kind: 'choice',
            helper: '适合整理候选餐厅和推荐理由。'
          },
          {
            title: '改成礼物推荐器',
            kind: 'choice',
            helper: '适合整理礼物、预算、适合对象和避雷点。'
          },
          {
            title: '改成旅行路线抽签器',
            kind: 'choice',
            helper: '适合整理城市、天数、预算和路线。'
          }
        ]
      };

      const defaults = {
        portfolio: {
          title: '我的中文小站',
          subtitle: '这里放我的自我介绍、代表作、项目、朋友链接和联系方式。',
          primary: '查看我的项目',

      function loadData() {
        const base = defaultDataForPack();
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
          if (!saved || typeof saved !== 'object') return base;
          return {
            ...base,
            ...saved,
            cards: saved.cards || base.cards,
            choices: saved.choices || base.choices,
            friends: saved.friends || base.friends
          };
        } catch (error) {
          return base;
        }
      }

      function saveData() {
        localStorage.setItem(storageKey, JSON.stringify(data));

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function safeColor(value) {
        return /^#[0-9a-fA-F]{6}$/.test(String(value || '')) ? value : '#1769c2';
      }

      function applyInput(target) {
        const name = target.name;
        const value = target.value;
        if (!name) return;
        const parts = name.split('.');
        if (parts.length === 3) {
          const [group, index, field] = parts;
          data[group][Number(index)][field] = value;
        } else {
          data[name] = value;
        }
        renderPreview();
        saveData();
      }

                  <a class="yuzhu-kicker" href="${escapeHtml(sourceDemoUrls[projectId])}" target="_blank" rel="noreferrer">原站静态副本</a>
                  <div class="yuzhu-intro-lines">${introLinesHtml()}</div>
                  <p class="yuzhu-section-note">${escapeHtml(data.subtitle)}</p>
                  <p class="yuzhu-dot">·</p>
                </section>
                <section class="yuzhu-section" data-yuzhu-panel="project">
                  <h3>${escapeHtml(data.sectionTitle)}</h3>
                  <p class="yuzhu-section-note">学任何东西最有成就感的时刻，莫过于自己的作品得到他人认可。</p>
                  <div class="yuzhu-card-grid">${yuzhuCardsHtml(data.cards)}</div>
                </section>
                <section class="yuzhu-section yuzhu-about" data-yuzhu-panel="intro">
                  <h3>自我介绍</h3>
                  <p class="yuzhu-section-note">${escapeHtml(data.intro)}</p>
                  <div class="yuzhu-skills">${chipsHtml(data.skillsText)}</div>
                </section>
                <section class="yuzhu-section" data-yuzhu-panel="blog">
                  <h3>博客</h3>
                  <p class="yuzhu-section-note">这里可以放最近写过的文章、学习记录或者想公开分享的小想法。</p>
                  <div class="yuzhu-card-grid">${yuzhuCardsHtml(data.cards.slice(0, 2))}</div>
                </section>
                <section class="yuzhu-section">
                  <h3>我的小伙伴们</h3>
                  <p class="yuzhu-section-note">开发和学习路上，ta 们陪我一同前行。</p>
                  <div class="yuzhu-card-grid">${yuzhuCardsHtml(data.friends)}</div>
                </section>
                <section class="yuzhu-contact" id="contact">
                  <h3>${escapeHtml(data.contactTitle)}</h3>
                  <p>${escapeHtml(data.contactNote)}</p>
                </section>
              </section>
            </div>
          </div>
        `;
      }

      function renderPortfolioPreview() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <span class="preview-cta">${escapeHtml(data.primary)}</span>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.sectionTitle)}</h3>
            <div class="preview-grid">${cardHtml(data.cards)}</div>
          </section>
        `;
      }

      function renderChoicePreview() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <span class="preview-cta">${escapeHtml(data.primary)}</span>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.question)}</h3>
            <div class="choice-list">
              ${data.choices
                .map(
                  (item, index) => `
                    <div class="choice-row">
                      <b>${index + 1}</b>
                      <div>
                        <strong>${escapeHtml(item.title)}</strong>
                        <p>${escapeHtml(item.meta)} · ${escapeHtml(item.note)}</p>
                      </div>
                    </div>
                  `
                )
                .join('')}
            </div>
            <div class="result-box">
              <strong>${escapeHtml(data.resultTitle)}</strong>
              <p>${escapeHtml(data.resultReason)}</p>
            </div>
          </section>
        `;
      }

      function renderPreview() {
        preview.style.setProperty('--accent', safeColor(data.color));
        if (isYuzhuPack()) {
          preview.innerHTML = renderYuzhuPreview();
          return;
        }
        preview.innerHTML = pack.kind === 'choice'
            ? renderChoicePreview()
            : renderPortfolioPreview();
      }

      function resetData() {
        data = defaultDataForPack();
        localStorage.setItem(storageKey, JSON.stringify(data));
        renderForm();
        renderPreview();
        saveNotice.textContent = '已恢复成示例内容，并保存到当前浏览器。';
      }

      const sampleDemoButton = document.getElementById('sampleDemoButton');
      sampleDemoButton.href = sampleDemoUrl;
      if (sourceDemoUrls[projectId]) {
        sampleDemoButton.target = '_blank';
        sampleDemoButton.rel = 'noreferrer';
      } else {
        sampleDemoButton.textContent = '看示例前端';
      }
      document.getElementById('mineDemoButton').href = mineDemoUrl;
      document.getElementById('editHint').textContent = pack.helper;
      if (isYuzhuPack()) {
        document.getElementById('editTitle').textContent = '具体修改 case';
        document.getElementById('editHint').textContent = '按这些字段把雨竹upon的小站换成你的内容。';
        document.getElementById('previewTitle').textContent = '我方重写的静态预览';
        document.getElementById('previewHint').textContent =
          '不是 iframe 原网页，而是按雨竹upon小站结构重写的可编辑静态版本。';
      }

      form.addEventListener('input', (event) => {
        applyInput(event.target);
      });

      preview.addEventListener('click', (event) => {
        if (!isYuzhuPack()) return;
        const sectionButton = event.target.closest('[data-yuzhu-section]');
        if (sectionButton) {
          const section = sectionButton.dataset.yuzhuSection;
          preview
            .querySelectorAll('[data-yuzhu-section]')
            .forEach((button) => button.classList.toggle('is-active', button === sectionButton));
          preview
            .querySelector(`[data-yuzhu-panel="${section}"]`)
            ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }

        const playerButton = event.target.closest('[data-yuzhu-player]');
        if (playerButton) {
          const player = playerButton.closest('.yuzhu-player');
          const isPlaying = !player.classList.contains('is-playing');
          player.classList.toggle('is-playing', isPlaying);
          playerButton.textContent = isPlaying ? 'Ⅱ 暂停' : '▶ 试听';
          const note = player.querySelector('.yuzhu-track span');
          note.textContent = isPlaying ? '播放中，静态演示' : '静态展示，不接外部音乐服务';
        }
      });

      saveButton.addEventListener('click', saveData);
      resetButton.addEventListener('click', resetData);

      renderForm();
      renderPreview();
    </script>
  </body>
</html>

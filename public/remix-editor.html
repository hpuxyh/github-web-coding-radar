<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="在网页里直接修改项目内容，实时预览自己的作品。"
    />
    <title>直接修改我的作品</title>
    <style>
      :root {
        color: #172033;
        background: #f7fbff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(247, 251, 255, 0.92), #ffffff 46%),
          url("assets/portfolio-hero.png");
        background-attachment: fixed;
        background-position: center top;
        background-size: cover;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        z-index: 20;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 5vw;
        border-bottom: 1px solid rgba(42, 67, 90, 0.12);
        background: rgba(248, 252, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 860;
      }

      .brand-mark {
        display: inline-grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: #172033;
        color: #ffffff;
        font-size: 0.8rem;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 14px;
        border: 1px solid rgba(31, 45, 64, 0.14);
        border-radius: 8px;
        background: #ffffff;
        color: #1d2a3b;
        font-weight: 850;
        box-shadow: 0 12px 28px rgba(31, 45, 64, 0.08);
      }

      .button.primary {
        border-color: #172033;
        background: #172033;
        color: #ffffff;
      }

      .button.subtle {
        box-shadow: none;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .shell {
        width: min(1240px, 100%);
        margin: 0 auto;
        padding: 34px 5vw 58px;
      }

      .intro {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }

      .intro-card {
        padding: 24px;
        border: 1px solid rgba(38, 59, 82, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 40px rgba(39, 58, 77, 0.08);
      }

      .eyebrow {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: #e8f3fb;
        color: #1769c2;
        font-size: 0.8rem;
        font-weight: 850;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 14px;
        color: #172033;
        font-size: clamp(2rem, 5vw, 4.6rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .lead {
        max-width: 760px;
        margin-top: 16px;
        color: #526174;
        font-size: 1.06rem;
        line-height: 1.75;
      }

      .status-card {
        min-height: 170px;
        display: grid;
        gap: 12px;
        padding: 20px;
        border: 1px solid rgba(38, 59, 82, 0.1);
        border-radius: 8px;
        background: #172033;
        color: #ffffff;
        box-shadow: 0 18px 40px rgba(39, 58, 77, 0.1);
      }

      .status-card span {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }

      .status-card strong {
        font-size: 1.26rem;
        line-height: 1.34;
      }

      .editor-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.1fr);
        gap: 18px;
        align-items: start;
      }

      .edit-panel,
      .preview-panel {
        border: 1px solid rgba(38, 59, 82, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 40px rgba(39, 58, 77, 0.07);
      }

      .panel-head {
        padding: 20px;
        border-bottom: 1px solid rgba(31, 45, 64, 0.1);
      }

      .panel-head h2 {
        color: #172033;
        font-size: 1.35rem;
      }

      .panel-head p {
        margin-top: 8px;
        color: #607084;
        line-height: 1.58;
      }

      .form-grid {
        display: grid;
        gap: 14px;
        padding: 20px;
      }

      label,
      .field-label {
        display: grid;
        gap: 6px;
        color: #243044;
        font-size: 0.92rem;
        font-weight: 820;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(31, 45, 64, 0.16);
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
      }

      input,
      select {
        min-height: 42px;
        padding: 0 12px;
      }

      textarea {
        min-height: 82px;
        padding: 10px 12px;
        resize: vertical;
      }

      input[type="color"] {
        min-height: 44px;
        padding: 4px;
      }

      .item-group {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #f8fbfd;
      }

      .item-group h3 {
        color: #172033;
        font-size: 1rem;
      }

      .two-cols {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .form-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 0 20px 20px;
      }

      .notice {
        color: #607084;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .preview-panel {
        position: sticky;
        top: 82px;
        overflow: hidden;
      }

      .preview-frame {
        padding: 22px;
        background: #f3f7fb;
      }

      .site-preview {
        min-height: 620px;
        overflow: hidden;
        border: 1px solid rgba(31, 45, 64, 0.12);
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
      }

      .preview-hero {
        min-height: 280px;
        display: grid;
        align-content: end;
        gap: 16px;
        padding: 34px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.66)),
          url("assets/portfolio-hero.png");
        background-position: center;
        background-size: cover;
      }

      .preview-kicker {
        width: fit-content;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 12%, #ffffff);
        color: var(--accent, #1769c2);
        font-size: 0.78rem;
        font-weight: 850;
      }

      .preview-hero h2 {
        max-width: 720px;
        color: #172033;
        font-size: clamp(2rem, 4vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .preview-hero p {
        max-width: 680px;
        color: #526174;
        font-size: 1.04rem;
        line-height: 1.7;
      }

      .preview-cta {
        width: fit-content;
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
        font-weight: 850;
      }

      .preview-section {
        padding: 24px 34px 34px;
      }

      .preview-section h3 {
        color: #172033;
        font-size: 1.26rem;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .preview-card {
        min-height: 168px;
        padding: 16px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #ffffff;
      }

      .preview-card strong {
        display: block;
        color: #172033;
        font-size: 1.04rem;
        line-height: 1.35;
      }

      .preview-card span {
        display: block;
        margin-top: 8px;
        color: var(--accent, #1769c2);
        font-size: 0.82rem;
        font-weight: 850;
      }

      .preview-card p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.62;
      }

      .choice-list {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .choice-row {
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 14px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #f8fbfd;
      }

      .choice-row b {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
      }

      .result-box {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid color-mix(in srgb, var(--accent, #1769c2) 24%, #ffffff);
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 8%, #ffffff);
      }

      .result-box strong {
        display: block;
        color: #172033;
      }

      .result-box p {
        margin-top: 8px;
        color: #526174;
        line-height: 1.62;
      }

      @supports not (color: color-mix(in srgb, #000 10%, #fff)) {
        .preview-kicker,
        .result-box {
          background: #eef7ff;
        }
      }

      @media (max-width: 1020px) {
        .intro,
        .editor-layout {
          grid-template-columns: 1fr;
        }

        .preview-panel {
          position: static;
        }
      }

      @media (max-width: 680px) {
        .topbar,
        .top-actions,
        .form-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }

        .shell {
          padding-top: 20px;
        }

        .intro-card,
        .status-card,
        .panel-head,
        .form-grid,
        .preview-frame {
          padding: 16px;
        }

        .two-cols,
        .preview-grid {
          grid-template-columns: 1fr;
        }

        .preview-hero,
        .preview-section {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./remix-mvp.html">
        <span class="brand-mark">改</span>
        <span>直接修改我的作品</span>
      </a>
      <div class="top-actions">
        <a class="button subtle" href="./remix-mvp.html#library">换一个改法</a>
        <button class="button primary" type="button" id="saveTop">保存</button>
      </div>
    </header>

    <main class="shell">
      <section class="intro" aria-labelledby="pageTitle">
        <div class="intro-card">
          <span class="eyebrow" id="packLabel">正在打开编辑页</span>
          <h1 id="pageTitle">在这里直接改，马上看到预览。</h1>
          <p class="lead" id="pageLead">
            左边填你自己的内容，右边马上看到作品长什么样。第一版先改文字、卡片、颜色和结果文案。
          </p>
        </div>
        <aside class="status-card">
          <span>当前改法</span>
          <strong id="currentPack">正在读取...</strong>
          <span id="helperText">内容会先保存到你自己的浏览器里。</span>
        </aside>
      </section>

      <section class="editor-layout">
        <section class="edit-panel" aria-labelledby="editTitle">
          <div class="panel-head">
            <h2 id="editTitle">填写内容</h2>
            <p id="editHint">先把示例文字换成自己的内容。</p>
          </div>
          <form class="form-grid" id="editorForm"></form>
          <div class="form-actions">
            <button class="button primary" type="button" id="saveButton">保存到我的浏览器</button>
            <button class="button" type="button" id="resetButton">清空重来</button>
            <span class="notice" id="saveNotice">还没有保存。</span>
          </div>
        </section>

        <section class="preview-panel" aria-labelledby="previewTitle">
          <div class="panel-head">
            <h2 id="previewTitle">预览我的作品</h2>
            <p>这里会跟着左边输入的内容一起变化。</p>
          </div>
          <div class="preview-frame">
            <div class="site-preview" id="preview"></div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const packCatalog = {
        'portfolio-page': [
          {
            title: '做一个个人作品集',
            kind: 'portfolio',
            helper: '适合先改名字、介绍、作品卡片和联系方式。'
          },
          {
            title: '改成小红书选题工具',
            kind: 'list',
            helper: '适合把选题整理成一张张卡片。'
          },
          {
            title: '改成 AI 工具榜单',
            kind: 'list',
            helper: '适合整理工具名称、用途和推荐理由。'
          }
        ],
        'dashboard-template': [
          {
            title: '改成个人收入看板',
            kind: 'list',
            helper: '适合整理收入、支出、结余和来源。'
          },
          {
            title: '改成产品灵感雷达',
            kind: 'list',
            helper: '适合整理产品名称、适合人群、为什么值得看。'
          },
          {
            title: '改成团队周报看板',
            kind: 'list',
            helper: '适合整理成员、本周完成、问题和下周计划。'
          }
        ],
        'choice-tool': [
          {
            title: '改成餐厅选择器',
            kind: 'choice',
            helper: '适合整理候选餐厅和推荐理由。'
          },
          {
            title: '改成礼物推荐器',
            kind: 'choice',
            helper: '适合整理礼物、预算、适合对象和避雷点。'
          },
          {
            title: '改成旅行路线抽签器',
            kind: 'choice',
            helper: '适合整理城市、天数、预算和路线。'
          }
        ]
      };

      const defaults = {
        portfolio: {
          title: '我的作品主页',
          subtitle: '这里放我做过的项目、我擅长的事情，以及别人可以怎么联系我。',
          primary: '查看我的作品',
          color: '#1769c2',
          kicker: '个人作品集',
          sectionTitle: '我想展示的作品',
          cards: [
            {
              title: '第一个作品',
              meta: '网页页面',
              note: '用一句话说清楚这个作品解决什么问题。'
            },
            {
              title: '第二个作品',
              meta: '小工具',
              note: '写它适合谁、别人为什么会想打开。'
            },
            {
              title: '联系方式',
              meta: '微信 / 邮箱',
              note: '放一个别人能找到你的方式。'
            }
          ]
        },
        list: {
          title: '我的 AI 工具清单',
          subtitle: '把我最近看到的好工具整理在这里，方便自己和朋友快速查看。',
          primary: '查看清单',
          color: '#1769c2',
          kicker: '清单页面',
          sectionTitle: '我整理的内容',
          cards: [
            {
              title: '工具一',
              meta: '适合新手',
              note: '它能帮我快速生成页面结构。'
            },
            {
              title: '工具二',
              meta: '适合做内容',
              note: '它能帮我整理选题和标题方向。'
            },
            {
              title: '工具三',
              meta: '以后再试',
              note: '它看起来有潜力，但我还需要继续测试。'
            }
          ]
        },
        choice: {
          title: '今晚吃什么',
          subtitle: '把候选项放进来，页面会给出一个推荐答案。',
          primary: '帮我选一个',
          color: '#1769c2',
          kicker: '选择小工具',
          question: '我应该选哪一个？',
          choices: [
            {
              title: '附近小馆',
              meta: '人均 50',
              note: '不用排队，适合临时决定。'
            },
            {
              title: '火锅店',
              meta: '适合 3 人以上',
              note: '热闹，但可能需要等位。'
            },
            {
              title: '轻食店',
              meta: '更清淡',
              note: '适合想吃简单一点的时候。'
            }
          ],
          resultTitle: '推荐：附近小馆',
          resultReason: '预算合适，距离近，不需要提前准备，最适合今天先去试试。'
        }
      };

      const projectNames = {
        'portfolio-page': '个人主页模板',
        'dashboard-template': '清单看板页面',
        'choice-tool': '选择困难小工具'
      };

      const params = new URLSearchParams(window.location.search);
      const projectId = packCatalog[params.get('project')] ? params.get('project') : 'portfolio-page';
      const packIndex = Math.min(
        Math.max(Number(params.get('pack') || 0), 0),
        packCatalog[projectId].length - 1
      );
      const pack = packCatalog[projectId][packIndex];
      const storageKey = `remix-editor-${projectId}-${packIndex}`;
      const form = document.getElementById('editorForm');
      const preview = document.getElementById('preview');
      const saveButton = document.getElementById('saveButton');
      const saveTop = document.getElementById('saveTop');
      const resetButton = document.getElementById('resetButton');
      const saveNotice = document.getElementById('saveNotice');

      let data = loadData();

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function loadData() {
        const base = clone(defaults[pack.kind]);
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
          if (!saved || typeof saved !== 'object') return base;
          return {
            ...base,
            ...saved,
            cards: saved.cards || base.cards,
            choices: saved.choices || base.choices
          };
        } catch (error) {
          return base;
        }
      }

      function saveData() {
        localStorage.setItem(storageKey, JSON.stringify(data));
        saveNotice.textContent = '已保存到当前浏览器。';
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function safeColor(value) {
        return /^#[0-9a-fA-F]{6}$/.test(String(value || '')) ? value : '#1769c2';
      }

      function renderCommonFields() {
        return `
          <label>
            页面标题
            <input name="title" value="${escapeHtml(data.title)}" />
          </label>
          <label>
            简短介绍
            <textarea name="subtitle">${escapeHtml(data.subtitle)}</textarea>
          </label>
          <div class="two-cols">
            <label>
              按钮文字
              <input name="primary" value="${escapeHtml(data.primary)}" />
            </label>
            <label>
              主色
              <input name="color" type="color" value="${safeColor(data.color)}" />
            </label>
          </div>
        `;
      }

      function renderCardsFields(items, name, label) {
        return items
          .map(
            (item, index) => `
              <div class="item-group">
                <h3>${label}${index + 1}</h3>
                <label>
                  标题
                  <input name="${name}.${index}.title" value="${escapeHtml(item.title)}" />
                </label>
                <label>
                  标签
                  <input name="${name}.${index}.meta" value="${escapeHtml(item.meta)}" />
                </label>
                <label>
                  说明
                  <textarea name="${name}.${index}.note">${escapeHtml(item.note)}</textarea>
                </label>
              </div>
            `
          )
          .join('');
      }

      function renderForm() {
        if (pack.kind === 'choice') {
          form.innerHTML = `
            ${renderCommonFields()}
            <label>
              选择问题
              <input name="question" value="${escapeHtml(data.question)}" />
            </label>
            <div class="field-label">
              候选项
              ${renderCardsFields(data.choices, 'choices', '候选项 ')}
            </div>
            <label>
              推荐结果
              <input name="resultTitle" value="${escapeHtml(data.resultTitle)}" />
            </label>
            <label>
              推荐理由
              <textarea name="resultReason">${escapeHtml(data.resultReason)}</textarea>
            </label>
          `;
          return;
        }

        form.innerHTML = `
          ${renderCommonFields()}
          <label>
            小标签
            <input name="kicker" value="${escapeHtml(data.kicker)}" />
          </label>
          <label>
            内容区标题
            <input name="sectionTitle" value="${escapeHtml(data.sectionTitle)}" />
          </label>
          <div class="field-label">
            卡片内容
            ${renderCardsFields(data.cards, 'cards', '卡片 ')}
          </div>
        `;
      }

      function applyInput(target) {
        const name = target.name;
        const value = target.value;
        if (!name) return;
        const parts = name.split('.');
        if (parts.length === 3) {
          const [group, index, field] = parts;
          data[group][Number(index)][field] = value;
        } else {
          data[name] = value;
        }
        saveNotice.textContent = '有新修改，记得保存。';
        renderPreview();
      }

      function cardHtml(items) {
        return items
          .map(
            (item) => `
              <article class="preview-card">
                <strong>${escapeHtml(item.title)}</strong>
                <span>${escapeHtml(item.meta)}</span>
                <p>${escapeHtml(item.note)}</p>
              </article>
            `
          )
          .join('');
      }

      function renderPortfolioPreview() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <span class="preview-cta">${escapeHtml(data.primary)}</span>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.sectionTitle)}</h3>
            <div class="preview-grid">${cardHtml(data.cards)}</div>
          </section>
        `;
      }

      function renderChoicePreview() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <span class="preview-cta">${escapeHtml(data.primary)}</span>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.question)}</h3>
            <div class="choice-list">
              ${data.choices
                .map(
                  (item, index) => `
                    <div class="choice-row">
                      <b>${index + 1}</b>
                      <div>
                        <strong>${escapeHtml(item.title)}</strong>
                        <p>${escapeHtml(item.meta)} · ${escapeHtml(item.note)}</p>
                      </div>
                    </div>
                  `
                )
                .join('')}
            </div>
            <div class="result-box">
              <strong>${escapeHtml(data.resultTitle)}</strong>
              <p>${escapeHtml(data.resultReason)}</p>
            </div>
          </section>
        `;
      }

      function renderPreview() {
        preview.style.setProperty('--accent', safeColor(data.color));
        preview.innerHTML = pack.kind === 'choice' ? renderChoicePreview() : renderPortfolioPreview();
      }

      function resetData() {
        data = clone(defaults[pack.kind]);
        localStorage.removeItem(storageKey);
        renderForm();
        renderPreview();
        saveNotice.textContent = '已恢复成示例内容。';
      }

      document.getElementById('packLabel').textContent = `${projectNames[projectId]} · 第 ${packIndex + 1} 个改法`;
      document.getElementById('currentPack').textContent = pack.title;
      document.getElementById('helperText').textContent = pack.helper;
      document.getElementById('editHint').textContent = pack.helper;

      form.addEventListener('input', (event) => {
        applyInput(event.target);
      });

      saveButton.addEventListener('click', saveData);
      saveTop.addEventListener('click', saveData);
      resetButton.addEventListener('click', resetData);

      renderForm();
      renderPreview();
    </script>
  </body>
</html>

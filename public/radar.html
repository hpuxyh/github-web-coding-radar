<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="每天帮你找好项目，自动筛出 AI 前沿趋势、实用产品灵感和热门开源项目，并整理成小白也能看懂的中文判断。"
    />
    <title>GitHub 好项目雷达</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8f2;
        --panel: #ffffff;
        --panel-2: #f0f5ed;
        --ink: #1f2d28;
        --muted: #6c7d76;
        --line: rgba(24, 60, 44, 0.10);
        --blue: #2f7f96;
        --green: #18825f;
        --amber: #bc7a22;
        --red: #c84f45;
        --control: rgba(255, 255, 255, 0.82);
        --shadow: 0 12px 30px rgba(31, 70, 50, 0.07);
        --radius: 12px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(246, 248, 242, 0.98), rgba(234, 241, 231, 0.98) 52%, rgba(248, 247, 241, 0.98)),
          repeating-linear-gradient(
            90deg,
            rgba(31, 45, 40, 0.035) 0,
            rgba(31, 45, 40, 0.035) 1px,
            transparent 1px,
            transparent 88px
          ),
          var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select {
        font: inherit;
      }

      a {
        color: inherit;
      }

      [hidden] {
        display: none !important;
      }

      .shell {
        width: min(1360px, calc(100% - 32px));
        margin: 0 auto;
        padding: 18px 0 42px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        min-height: 68px;
        padding: 6px 0 10px;
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--blue), var(--green));
        color: #ffffff;
        font-weight: 900;
      }

      .topbar-note {
        max-width: 380px;
        color: var(--muted);
        text-align: right;
        line-height: 1.5;
      }

      .topbar-note strong,
      .topbar-note span {
        display: block;
      }

      .topbar-note strong {
        color: var(--ink);
        font-size: 0.92rem;
      }

      .topbar-note span {
        margin-top: 2px;
        font-size: 0.82rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 2.4vw, 2.2rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 10px;
        margin-top: 6px;
      }

      .metric {
        min-height: 76px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 8px 20px rgba(31, 70, 50, 0.045);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .metric:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px rgba(31, 70, 50, 0.12);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .metric strong {
        display: block;
        margin-top: 5px;
        color: var(--ink);
        font-size: clamp(1.12rem, 1.8vw, 1.55rem);
        line-height: 1;
        overflow-wrap: anywhere;
      }

      .metric small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .controls {
        position: sticky;
        z-index: 20;
        top: 0;
        display: grid;
        grid-template-columns: minmax(280px, 1fr) 174px auto;
        gap: 10px;
        align-items: center;
        margin: 14px 0 16px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--control);
        box-shadow: 0 12px 30px rgba(31, 70, 50, 0.08);
        backdrop-filter: blur(16px);
      }

      .search {
        position: relative;
      }

      .search input,
      select {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel);
        color: var(--ink);
        outline: 0;
        box-shadow: 0 1px 2px rgba(31, 70, 50, 0.05);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .search input:focus,
      select:focus {
        border-color: rgba(33, 181, 115, 0.6);
        box-shadow: 0 0 0 3px rgba(33, 181, 115, 0.14);
      }

      .search input {
        padding: 0 42px;
      }

      .search span {
        position: absolute;
        left: 14px;
        top: 50%;
        color: var(--muted);
        transform: translateY(-50%);
      }

      .clear-search {
        position: absolute;
        right: 8px;
        top: 50%;
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        background: rgba(24, 60, 44, 0.07);
        color: var(--muted);
        cursor: pointer;
        transform: translateY(-50%);
      }

      .clear-search:hover {
        background: rgba(24, 60, 44, 0.12);
        color: var(--ink);
      }

      select {
        min-width: 166px;
        padding: 0 12px;
      }

      .tabs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 1px 2px rgba(31, 70, 50, 0.05);
      }

      .tabs button {
        min-height: 34px;
        min-width: 92px;
        border: 0;
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-weight: 650;
        transition: background 0.18s ease, color 0.18s ease;
      }

      .tabs button:hover {
        background: rgba(33, 181, 115, 0.08);
        color: var(--ink);
      }

      .tabs button[aria-selected="true"] {
        background: linear-gradient(135deg, var(--green), var(--blue));
        color: #ffffff;
        font-weight: 800;
        box-shadow: 0 4px 12px rgba(33, 181, 115, 0.28);
      }

      .content-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .list,
      .side-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .list-header,
      .side-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .list-header h2,
      .side-header h2 {
        margin: 0;
        font-size: 1.02rem;
        line-height: 1.2;
      }

      .list-heading {
        min-width: 0;
      }

      .list-hint {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .count {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .repo-list {
        display: grid;
      }

      .repo-row {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) 136px;
        gap: 14px;
        padding: 17px 16px;
        border-bottom: 1px solid var(--line);
        transition: background 0.16s ease;
      }

      .repo-row:hover {
        background: rgba(33, 181, 115, 0.045);
      }

      .repo-row:last-child {
        border-bottom: 0;
      }

      .rank {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: linear-gradient(135deg, rgba(33, 181, 115, 0.16), rgba(43, 159, 214, 0.16));
        color: #197a52;
        font-weight: 900;
      }

      .repo-main {
        min-width: 0;
      }

      .repo-title {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 0;
        font-size: 1rem;
      }

      .repo-kicker {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.4;
      }

      .repo-kicker span {
        padding: 2px 7px;
        border: 1px solid rgba(24, 60, 44, 0.09);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.6);
      }

      .repo-title a {
        color: var(--ink);
        text-decoration: none;
        font-weight: 750;
      }

      .repo-title a:hover {
        color: var(--green);
      }

      .repo-name {
        color: var(--ink);
        font-weight: 800;
        font-size: 1.04rem;
      }

      .badge {
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(33, 181, 115, 0.12);
        color: #157a4d;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .description {
        margin: 8px 0 0;
        color: #41524b;
        line-height: 1.56;
        max-width: 82ch;
      }

      .reason {
        margin: 9px 0 0;
        padding: 8px 12px;
        border-left: 3px solid var(--green);
        border-radius: 0 10px 10px 0;
        background: rgba(33, 181, 115, 0.07);
        color: #2c6f4e;
        line-height: 1.55;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .detail-item {
        padding: 12px;
        border: 1px solid rgba(43, 159, 214, 0.2);
        border-radius: 11px;
        background: rgba(43, 159, 214, 0.06);
      }

      .detail-item strong {
        display: block;
        margin-bottom: 7px;
        color: #1d6f97;
        font-size: 0.82rem;
      }

      .detail-item p {
        margin: 0;
        color: #44544c;
        line-height: 1.55;
        font-size: 0.86rem;
      }

      .repo-more-details {
        margin-top: 10px;
        border: 1px solid rgba(43, 159, 214, 0.18);
        border-radius: 11px;
        background: rgba(43, 159, 214, 0.035);
        overflow: hidden;
      }

      .repo-more-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        color: #1d6f97;
        list-style: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 850;
      }

      .repo-more-summary::-webkit-details-marker {
        display: none;
      }

      .repo-more-summary::after {
        content: "⌄";
        color: #1d6f97;
        transition: transform 0.18s ease;
      }

      .repo-more-details[open] .repo-more-summary {
        border-bottom: 1px solid rgba(43, 159, 214, 0.16);
      }

      .repo-more-details[open] .repo-more-summary::after {
        transform: rotate(180deg);
      }

      .repo-more-body {
        padding: 0 10px 10px;
      }

      .expert-signals {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(33, 181, 115, 0.2);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.06);
      }

      .expert-signals-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .expert-signals-header strong {
        color: #12734d;
        font-size: 0.88rem;
      }

      .expert-signals-header span {
        color: #61736c;
        font-size: 0.8rem;
        font-weight: 750;
      }

      .expert-signals p {
        margin: 8px 0 0;
        color: #40584d;
        line-height: 1.55;
        font-size: 0.86rem;
      }

      .expert-signal-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .expert-signal-list a,
      .expert-signal-list span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 25px;
        padding: 0 8px;
        border: 1px solid rgba(33, 181, 115, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: #176f4b;
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 760;
      }

      .expert-signal-list a:hover {
        border-color: rgba(33, 181, 115, 0.45);
        color: #0f7a50;
      }

      .beginner-difficulty {
        margin-top: 12px;
        border: 1px solid rgba(214, 145, 42, 0.22);
        border-radius: 11px;
        background: rgba(214, 145, 42, 0.06);
        overflow: hidden;
      }

      .beginner-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        list-style: none;
        cursor: pointer;
      }

      .beginner-summary::-webkit-details-marker {
        display: none;
      }

      .beginner-title {
        color: #7a4a12;
        font-size: 0.88rem;
        font-weight: 850;
        line-height: 1.2;
      }

      .beginner-summary-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
        margin-left: auto;
      }

      .beginner-summary::after {
        content: "⌄";
        flex: 0 0 auto;
        color: #8a560f;
        font-size: 1.05rem;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .beginner-difficulty[open] .beginner-summary::after {
        transform: rotate(180deg);
      }

      .beginner-difficulty[open] .beginner-summary {
        border-bottom: 1px solid rgba(214, 145, 42, 0.16);
      }

      .difficulty-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 10px;
      }

      .difficulty-item {
        padding: 11px 12px;
        border: 1px solid rgba(214, 145, 42, 0.18);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.74);
      }

      .difficulty-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 7px;
      }

      .difficulty-top strong {
        color: var(--ink);
        font-size: 0.82rem;
      }

      .difficulty-level {
        flex: 0 0 auto;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(33, 181, 115, 0.12);
        color: #157a4d;
        font-size: 0.74rem;
        font-weight: 850;
      }

      .difficulty-level.level-3 {
        background: rgba(214, 145, 42, 0.15);
        color: #8a560f;
      }

      .difficulty-level.level-4,
      .difficulty-level.level-5 {
        background: rgba(224, 90, 79, 0.12);
        color: #a13a2f;
      }

      .difficulty-level.overall {
        background: rgba(122, 74, 18, 0.12);
        color: #7a4a12;
      }

      .difficulty-item p {
        margin: 0;
        color: #465750;
        line-height: 1.52;
        font-size: 0.84rem;
      }

      .difficulty-item ul {
        display: grid;
        gap: 5px;
        margin: 8px 0 0;
        padding-left: 18px;
        color: #647269;
        line-height: 1.44;
        font-size: 0.78rem;
      }

      .usage-details {
        margin-top: 12px;
        border: 1px solid rgba(33, 181, 115, 0.24);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.04);
        overflow: hidden;
      }

      .usage-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        list-style: none;
        cursor: pointer;
        color: #147a54;
        font-size: 0.92rem;
        font-weight: 850;
      }

      .usage-summary::-webkit-details-marker {
        display: none;
      }

      .usage-summary::after {
        content: "⌄";
        flex: 0 0 auto;
        font-size: 1.1rem;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .usage-details[open] .usage-summary::after {
        transform: rotate(180deg);
      }

      .usage-details[open] .usage-summary {
        border-bottom: 1px solid rgba(33, 181, 115, 0.16);
      }

      .playbook {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 0;
        padding: 10px;
      }

      .playbook-block {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--panel-2);
      }

      .playbook-block h4 {
        margin: 0 0 8px;
        color: var(--ink);
        font-size: 0.82rem;
        line-height: 1.2;
      }

      .playbook-block ul,
      .playbook-block ol {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
        color: #4a5a52;
        line-height: 1.5;
        font-size: 0.84rem;
      }

      .example {
        margin: 10px 0 0;
        border: 1px solid rgba(33, 181, 115, 0.28);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.05);
        overflow: hidden;
      }

      .example-details {
        margin-top: 12px;
        border: 1px solid rgba(33, 181, 115, 0.18);
        border-radius: 11px;
        background: rgba(33, 181, 115, 0.035);
        overflow: hidden;
      }

      .example-details summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        color: #176f4b;
        list-style: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 850;
      }

      .example-details summary::-webkit-details-marker {
        display: none;
      }

      .example-details summary::after {
        content: "⌄";
        color: #176f4b;
        transition: transform 0.18s ease;
      }

      .example-details[open] summary {
        border-bottom: 1px solid rgba(33, 181, 115, 0.16);
      }

      .example-details[open] summary::after {
        transform: rotate(180deg);
      }

      .example-details:not([open]) > :not(summary),
      .repo-more-details:not([open]) > :not(summary),
      .beginner-difficulty:not([open]) > :not(summary),
      .usage-details:not([open]) > :not(summary) {
        display: none;
      }

      .example-details .example-list {
        margin: 0;
        padding: 0 10px 10px;
      }

      .example-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .example-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(33, 181, 115, 0.2);
        color: #1f7a52;
        font-weight: 700;
        font-size: 0.88rem;
      }

      .example-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .example-tag {
        padding: 1px 9px;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-size: 0.74rem;
        font-weight: 800;
      }

      .example p {
        margin: 0;
        padding: 11px 13px;
        color: #3a4a43;
        line-height: 1.6;
        font-size: 0.88rem;
      }

      .example-media {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        padding: 12px 13px 2px;
      }

      .example-media figure {
        margin: 0;
        border: 1px solid rgba(33, 181, 115, 0.16);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        overflow: hidden;
      }

      .example-media img {
        display: block;
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        background: #ffffff;
      }

      .example-media figcaption {
        padding: 7px 9px;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1.35;
      }

      .generated-example {
        margin: 12px 13px 2px;
        border: 1px solid rgba(43, 159, 214, 0.18);
        border-radius: 12px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(241, 247, 243, 0.92)),
          radial-gradient(circle at 18% 12%, rgba(33, 181, 115, 0.18), transparent 32%),
          radial-gradient(circle at 88% 18%, rgba(43, 159, 214, 0.18), transparent 34%);
        overflow: hidden;
      }

      .generated-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(43, 159, 214, 0.12);
      }

      .generated-title {
        color: var(--ink);
        font-weight: 850;
        font-size: 0.88rem;
      }

      .generated-label {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 2px 8px;
        background: rgba(43, 159, 214, 0.12);
        color: #216f97;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .generated-canvas {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
        gap: 10px;
        align-items: stretch;
        padding: 12px;

    <main class="shell">

            <h1>每天帮你找好项目</h1>

          <div class="list-header">

            <span class="count" id="resultCount">0 个项目</span>
          </div>
          <div class="repo-list" id="repoList"></div>
        </section>

        <aside class="side-panel">
          <div class="side-header">
            <h2>小红书草稿</h2>
            <span class="count" id="draftCount">0 篇</span>
          </div>
          <div class="draft-list" id="draftList"></div>
        </aside>
      </section>

      function featureBasedName(repo) {
        const features = repo.features || [];
        if (features.includes('Low-code / No-code')) return '不用写代码的搭应用工具';
        if (features.includes('Web IDE / Browser Editor')) return '网页里的写代码工具';
        if (features.includes('Sandbox / Preview')) return '代码运行和预览工具';
        if (features.includes('MCP / Tool Calling')) return 'AI 工具连接器';
        if (features.includes('AI Coding / Agent')) return 'AI 编程助手';
        if (features.includes('Deploy / Cloud')) return '一键发布工具';
        if (features.includes('Testing / Quality')) return '代码检查工具';
        return '值得看看的一款工具';
      }

      function cleanFriendlyName(value) {
        return String(value || '')
          .replace(/^这是?一个/, '')
          .replace(/^这是?一套/, '')
          .replace(/^这是?一本/, '')
          .replace(/^一个/, '')
          .replace(/^一套/, '')
          .replace(/^一本/, '')
          .replace(/[。.!！；;：:].*$/, '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function displayProjectName(repo) {
        if (friendlyProjectNameText[repo.full_name]) return friendlyProjectNameText[repo.full_name];
        const details = projectDetails(repo);
        const fromDetails = cleanFriendlyName(details.what);
        if (fromDetails && /[\u4e00-\u9fff]/.test(fromDetails)) {
          return fromDetails.length > 18 ? `${fromDetails.slice(0, 18)}…` : fromDetails;
        }
        return featureBasedName(repo);
      }

      function normalizeExampleEntry(entry) {
        if (!entry) return null;
        if (typeof entry === 'string') {
          return { title: '举个例子', body: entry, code: '', images: [], source: '简化示例' };
        }
        const title = String(entry.title || entry.name || '项目里的示例').trim();
        const body = String(entry.body || entry.text || entry.description || '').trim();
        const code = String(entry.code || '').trim();
        const images = Array.isArray(entry.images)
          ? entry.images
              .map((image) => ({
                url: String(image?.url || '').trim(),
                alt: String(image?.alt || '项目示例图').trim(),
              }))
              .filter((image) => image.url)
              .slice(0, 2)
          : [];
        const source = String(entry.source || 'README').trim();
        if (!body && !code && !images.length) return null;
        return { title, body, code, images, source };
      }

      function repoExamples(repo) {
        const extracted = Array.isArray(repo.examples)
          ? repo.examples.map(normalizeExampleEntry).filter(Boolean)
          : [];
        const manual = normalizeExampleEntry(projectExampleText[repo.full_name]);
        const combined = [];
        if (manual) {
          if (!manual.images.length && extracted[0]?.images?.length) {
            manual.images = extracted[0].images;
          }
          combined.push(manual);
        }
        for (const example of extracted) {
          const repeated = combined.some(
            (item) =>
              item.body === example.body ||
              (item.code && item.code === example.code) ||
              (item.images?.[0]?.url && item.images[0].url === example.images?.[0]?.url),
          );
          if (!repeated) combined.push(example);
        }
        if (!combined.length) {
          const details = projectDetails(repo);
          const playbook = repoPlaybook(repo);
          combined.push({
            title: '可能的使用场景',
            body: playbook.scenarios?.[0] || details.canDo || '这个项目适合先看用途，再判断能不能用到自己的工作里。',
            code: '',
            images: [],
            source: '生成示意',
          });
        }
        return combined.slice(0, 1);
      }

      function generatedVisualText(repo, example) {
        const details = projectDetails(repo);
        const playbook = repoPlaybook(repo);
        const features = repo.features || [];
        const firstScenario = playbook.scenarios?.[0] || details.canDo || '把一个想法交给工具处理。';
        const firstStep = playbook.steps?.[0] || '输入你的目标或素材。';
        const output = details.canDo || example.body || '得到一个可以继续修改或使用的结果。';

        let title = '生成示意图';
        let input = firstStep;
        let process = '工具根据你的目标自动处理。';
        if (features.includes('AI Coding / Agent')) {
          title = 'AI 写代码流程示意';
          input = '输入需求、报错或项目目标';
          process = 'AI 读取项目、拆任务、改代码';
        } else if (features.includes('Web IDE / Browser Editor')) {
          title = '网页里做项目示意';
          input = '打开网页工作台并输入需求';
          process = '在线编辑、预览、继续修改';
        } else if (features.includes('Sandbox / Preview')) {
          title = '运行预览流程示意';
          input = '放入代码或让 AI 生成代码';
          process = '在隔离环境里运行和看日志';
        } else if (features.includes('MCP / Tool Calling')) {
          title = 'AI 调工具流程示意';
          input = '告诉 AI 要完成的任务';
          process = 'AI 调用外部工具拿数据或执行动作';
        } else if (features.includes('Low-code / No-code')) {
          title = '低代码搭应用示意';
          input = '选择模板、表单或数据源';
          process = '拖拽组件并配置自动流程';
        }

        return {
          title,
          input: input.slice(0, 38),
          process,
          output: output.slice(0, 52),
          scenario: firstScenario.slice(0, 48),
        };
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          const ok = document.execCommand('copy');
          textarea.remove();
          return ok;
        }
      }

      function rankingReason(repo, tabName = state.activeTab) {

          return `为什么值得看：它不只是技术演示，更像一个可以拿来用、拿来改、拿来做内容的产品点子。`;

        return '为什么值得看：收藏的人很多，说明它已经被大量开发者验证过，适合当成经典案例来学习。';

      // 把更新时间说成人话：最近更新过就标“还在更新”，否则给一个大概时间。
      function freshnessText(repo) {
        if (!repo.pushed_at) return '更新时间未知';
        const days = Math.floor((Date.now() - new Date(repo.pushed_at).getTime()) / 86400000);
        if (days <= 14) return '最近还在更新';
        if (days <= 60) return '近期有更新';
        const ym = String(repo.pushed_at).slice(0, 7);
        return `最近更新 ${ym}`;
      }

      function expertSignals(repo) {
        return Array.isArray(repo.expert_signals) ? repo.expert_signals.filter(Boolean) : [];
      }

      function expertSignalSummaryText(repo) {
        const signals = expertSignals(repo);
        if (!signals.length) return '';
        const experts = [...new Set(signals.map((item) => item.expert_name || item.expert_id).filter(Boolean))];
        const categories = [...new Set(signals.map((item) => item.category_label || item.category).filter(Boolean))];
        const sources = [...new Set(signals.map((item) => item.source_label || item.source).filter(Boolean))];
        const expertText =
          experts.length > 3 ? `${experts.slice(0, 3).join('、')} 等 ${experts.length} 个观察源` : experts.join('、');
        return `${expertText} 通过${sources.slice(0, 2).join('、')}关注到它，覆盖${categories.slice(0, 2).join('、')}。`;
      }

          .map((repo) => repo.pushed_at)

      function exclusiveRankings(data) {
        const seen = new Set();
        const take = (repos = []) =>
          repos.filter((repo) => {
            const key = repo.full_name || repo.html_url || repo.name;
            if (!key) return true;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });

        return {
          frontier: take(data.frontier || []),
          product_ideas: take(data.product_ideas || []),
          rising: take(data.rising || []),
          all_time: take(data.all_time || []),
        };
      }

      function getReposForTab() {
        if (!state.data) return [];
        const rankings = exclusiveRankings(state.data);
        if (state.activeTab === 'frontier') return rankings.frontier;
        if (state.activeTab === 'product_ideas') return rankings.product_ideas;
        if (state.activeTab === 'all_time') return rankings.all_time;
        if (state.activeTab === 'drafts') return state.data.xhs_repos || [];
        return rankings.rising;
      }

      function repoSearchText(repo) {
        const details = projectDetails(repo);
        const difficulty = beginnerDifficulty(repo);
        return [
          displayProjectName(repo),
          repo.full_name,
          toChineseIntro(repo),
          details.what,
          details.canDo,
          details.who,
          ...repoExamples(repo).flatMap((example) => [
            example.title,
            example.body,
            example.code,
            ...(example.images || []).map((image) => image.alt),
          ]),
          repo.language,
          repo.license,
          rankingReason(repo),
          difficulty.install.label,
          difficulty.install.summary,
          ...difficulty.install.reasons,
          difficulty.use.label,
          difficulty.use.summary,
          ...difficulty.use.reasons,
          expertSignalSummaryText(repo),
          ...expertSignals(repo).flatMap((signal) => [
            signal.expert_name,
            signal.expert_id,
            signal.category_label,
            signal.source_label,
            signal.note,
          ]),
          ...(repo.features || []).map(toChineseFeature),
          ...(repo.features || []),
          ...(repo.topics || []),
        ]
          .join(' ')
          .toLowerCase();
      }

      function sortedRepos(repos) {
        const withRank = repos.map((repo, index) => ({ ...repo, _rank: index + 1 }));
        const filtered = withRank.filter((repo) => repoSearchText(repo).includes(state.query));
        if (state.sort === 'stars') {
          return filtered.sort((a, b) => Number(b.stars || 0) - Number(a.stars || 0));
        }
        if (state.sort === 'velocity') {
          return filtered.sort((a, b) => Number(b.star_velocity || 0) - Number(a.star_velocity || 0));
        }
        if (state.sort === 'recent') {
          return filtered.sort((a, b) => String(b.pushed_at || '').localeCompare(String(a.pushed_at || '')));
        }
        return filtered.sort((a, b) => a._rank - b._rank);
      }

          <div class="repo-score ${extraClass}">
            <a class="small-link primary" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noreferrer">打开 GitHub</a>
            ${demoUrl ? `<a class="small-link secondary" href="${escapeHtml(demoUrl)}" target="_blank" rel="noreferrer">看演示/官网</a>` : ''}
            ${draft ? `<button class="small-link" type="button" data-copy-repo="${escapeHtml(repoKey(repo))}">复制草稿</button>` : ''}
          </div>
        `;
      }

      function renderRepos() {
        const repos = sortedRepos(getReposForTab());
        const titleMap = {
          frontier: '大佬在看榜',
          product_ideas: '产品灵感榜',
          rising: '正在变火榜',
          all_time: '经典项目榜',
          drafts: '发帖草稿关联项目',
        };
        const hintMap = {
          frontier: '先看 AI 圈和技术圈的早期信号，适合找趋势和选题。',
          product_ideas: '优先看能试、能改、能做内容的产品点子。',
          rising: '按近期热度变化看正在被更多人发现的项目。',
          all_time: '适合补课和找经典案例，热度高但不一定最新。',
          drafts: '这些项目已经被整理成小红书草稿，可以直接复制再改。',
        };
        listTitle.textContent = titleMap[state.activeTab];
        listHint.textContent = `${hintMap[state.activeTab]}${state.query ? ` 当前搜索：${state.query}` : ''}`;
        resultCount.textContent = `${repos.length} 个项目`;

        if (!repos.length) {
          repoList.innerHTML = '<div class="empty">没有匹配的项目。可以换一个关键词，或点右侧清除搜索。</div>';
          return;
        }

        repoList.innerHTML = repos
          .map((repo) => {
            const features = repo.features?.length ? repo.features.map(toChineseFeature) : ['待确认'];
            const playbook = repoPlaybook(repo);
            const details = projectDetails(repo);
            const edge = projectEdgeText[repo.full_name];
            const friendlyName = displayProjectName(repo);
            const examples = renderExampleBlocks(repo);
            const demoUrl = homepageUrl(repo);
            const draft = draftForRepo(repo);
            return `
              <article class="repo-row">
                <div class="rank">${String(repo._rank).padStart(2, '0')}</div>
                <div class="repo-main">
                  <p class="repo-kicker">
                    <span>${escapeHtml(repo.full_name || repo.name || 'GitHub 项目')}</span>
                    ${repo.language ? `<span>${escapeHtml(repo.language)}</span>` : ''}
                    <span>${compact(repo.stars)} 人收藏</span>
                    <span>${escapeHtml(freshnessText(repo))}</span>
                  </p>
                  <h3 class="repo-title">
                    <span class="repo-name">${escapeHtml(friendlyName || `项目 ${repo._rank}`)}</span>
                    <span class="badge">${escapeHtml(heatBadge(repo))}</span>
                  </h3>
                  <p class="description">${escapeHtml(toChineseIntro(repo))}</p>
                  ${renderRepoActions(repo, demoUrl, draft, 'repo-score-mobile')}
                  ${
                    examples
                      ? `<details class="example-details">
                          <summary>看截图和 README 示例</summary>
                          ${examples}
                        </details>`
                      : ''
                  }
                  <div class="features">
                    ${features.map((feature) => `<span>${escapeHtml(feature)}</span>`).join('')}
                  </div>
                  <div class="meta">
                    <span>${compact(repo.stars)} 人收藏</span>
                    <span>${escapeHtml(freshnessText(repo))}</span>
                  </div>
                  <details class="repo-more-details">
                    <summary class="repo-more-summary">看判断详情、难度和用法</summary>
                    <div class="repo-more-body">
                      <div class="detail-grid">
                        <section class="detail-item">
                          <strong>这是什么</strong>
                          <p>${escapeHtml(details.what)}</p>
                        </section>
                        <section class="detail-item">
                          <strong>能帮你做什么</strong>
                          <p>${escapeHtml(details.canDo)}</p>
                        </section>
                        <section class="detail-item">
                          <strong>适合谁</strong>
                          <p>${escapeHtml(details.who)}</p>
                        </section>
                      </div>
                      ${renderExpertSignals(repo)}
                      ${renderDifficultyBlock(repo)}
                      <details class="usage-details">
                        <summary class="usage-summary">点开看具体怎么用</summary>
                        <div class="playbook">
                          <section class="playbook-block">
                            <h4>可以怎么用</h4>
                            <ul>
                              ${playbook.scenarios.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                            </ul>
                          </section>
                          <section class="playbook-block">
                            <h4>上手步骤</h4>
                            <ol>
                              ${playbook.steps.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                            </ol>
                          </section>
                        </div>
                      </details>
                      ${edge ? `<section class="edge">
                        <h4>它强在哪？为什么 Codex、Claude Code 替不了</h4>
                        <ul>${edge.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
                      </section>` : ''}
                    </div>
                  </details>
                </div>
                ${renderRepoActions(repo, demoUrl, draft, 'repo-score-desktop')}
              </article>
            `;
          })
          .join('');
      }

      function renderDrafts() {
        const drafts = collectDrafts(state.data || {});
        draftCount.textContent = `${drafts.length} 篇`;
        if (!drafts.length) {
          draftList.innerHTML = '<div class="empty">暂无草稿。</div>';
          return;
        }

        draftList.innerHTML = drafts
          .map(
            (draft) => `
              <article class="draft">
                <button type="button" data-copy="${draft.index}" title="复制草稿">
                  <strong>${escapeHtml(draft.index)}. ${escapeHtml(draft.title)}</strong>
                  <span>复制</span>
                </button>
                <pre>${escapeHtml(draft.text)}</pre>
              </article>
            `,
          )
          .join('');
      }

      function render() {
        if (!state.data) return;
        renderSummary(state.data);
        renderRepos();
        renderDrafts();
      }

      function loadData() {
        repoList.innerHTML = '';
        try {
          const embedded = document.getElementById('embedded-radar-data');
          state.data = JSON.parse(embedded.textContent || '{}');
          render();
        } catch (error) {
          summary.innerHTML = '';
          subtitle.textContent = '静态数据读取失败';
          repoList.innerHTML = `<div class="error">静态数据读取失败：${escapeHtml(error.message)}</div>`;
          draftList.innerHTML = '<div class="empty">暂无草稿。</div>';
        }
      }

      document.querySelectorAll('.tabs button').forEach((button) => {
        button.addEventListener('click', () => {
          state.activeTab = button.dataset.tab;
          document.querySelectorAll('.tabs button').forEach((item) => {
            item.setAttribute('aria-selected', String(item === button));
          });
          renderRepos();
        });
      });

      searchInput.addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        updateSearchUi();
        renderRepos();
      });

      searchInput.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape' || !state.query) return;
        state.query = '';
        searchInput.value = '';
        updateSearchUi();
        renderRepos();
      });

      clearSearch.addEventListener('click', () => {
        state.query = '';
        searchInput.value = '';
        updateSearchUi();
        searchInput.focus();
        renderRepos();
      });

      $('#sortSelect').addEventListener('change', (event) => {
        state.sort = event.target.value;
        renderRepos();
      });

      repoList.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-copy-repo]');
        if (!button) return;
        const drafts = collectDrafts(state.data || {});
        const draft = drafts.find((item) => repoKey(item.repo) === button.dataset.copyRepo);
        if (!draft) return;
        const oldText = button.textContent;
        const copied = await copyText(draft.text);
        button.textContent = copied ? '已复制' : '复制失败';
        setTimeout(() => {
          button.textContent = oldText;
        }, 1400);
      });

      draftList.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-copy]');
        if (!button) return;
        const drafts = collectDrafts(state.data || {});
        const draft = drafts.find((item) => String(item.index) === button.dataset.copy);
        if (!draft) return;
        await copyText(draft.text);
        const oldText = button.querySelector('span').textContent;
        button.querySelector('span').textContent = '已复制';
        setTimeout(() => {
          button.querySelector('span').textContent = oldText;
        }, 1200);
      });

      updateSearchUi();
      loadData();
    </script>
  </body>
</html>

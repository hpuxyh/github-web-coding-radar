    <style>
      :root {
        color: #172033;
        background: #f7fbff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: #f7fbff;
      }

      button {
        cursor: pointer;
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        z-index: 20;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 5vw;
        border-bottom: 1px solid rgba(42, 67, 90, 0.12);
        background: rgba(248, 252, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 860;
      }

      .brand-mark {
        display: inline-grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: #172033;
        color: #ffffff;
        font-size: 0.8rem;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border: 1px solid rgba(31, 45, 64, 0.14);
        border-radius: 8px;
        background: #ffffff;
        color: #1d2a3b;
        font-weight: 850;
        box-shadow: 0 12px 28px rgba(31, 45, 64, 0.08);
      }

      .button.primary {
        border-color: #172033;
        background: #172033;
        color: #ffffff;
      }

      .demo-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px 5vw 56px;
      }

      .demo-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin-bottom: 18px;
      }

      .eyebrow {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: #e8f3fb;
        color: #1769c2;
        font-size: 0.8rem;
        font-weight: 850;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        max-width: 760px;
        margin-top: 12px;
        color: #172033;
        font-size: clamp(2rem, 5vw, 4.2rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .demo-note {
        max-width: 720px;
        margin-top: 12px;
        color: #607084;
        line-height: 1.7;
      }

      .status-box {
        max-width: 320px;
        padding: 16px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #ffffff;
        color: #526174;
        line-height: 1.58;
      }

      .demo-stage {
        overflow: hidden;
        border: 1px solid rgba(31, 45, 64, 0.12);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 54px rgba(39, 58, 77, 0.09);
      }

      .site-preview {
        min-height: 720px;
        background: #ffffff;
        color: #172033;
      }

      .preview-hero {
        min-height: 430px;
        display: grid;
        align-content: center;
        gap: 18px;
        padding: clamp(32px, 8vw, 82px);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.7)),
          url("assets/portfolio-hero.png");
        background-position: center;
        background-size: cover;
      }

      .preview-kicker {
        width: fit-content;
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 12%, #ffffff);
        color: var(--accent, #1769c2);
        font-size: 0.82rem;
        font-weight: 850;
      }

      .preview-hero h2 {
        max-width: 760px;
        color: #172033;
        font-size: clamp(2.4rem, 8vw, 6.4rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .preview-hero p {
        max-width: 720px;
        color: #526174;
        font-size: clamp(1.08rem, 2vw, 1.3rem);
        line-height: 1.7;
      }

      .preview-cta,
      .choice-action {
        width: fit-content;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
        font-weight: 850;
      }

      .preview-section {
        padding: clamp(28px, 6vw, 64px);
      }

      .preview-section h3 {
        color: #172033;
        font-size: clamp(1.6rem, 4vw, 3rem);
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 20px;
      }

      .preview-card {
        min-height: 180px;
        padding: 18px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #ffffff;
      }

      .preview-card strong {
        display: block;
        color: #172033;
        font-size: 1.08rem;
        line-height: 1.35;
      }

      .preview-card span {
        display: block;
        margin-top: 8px;
        color: var(--accent, #1769c2);
        font-size: 0.84rem;
        font-weight: 850;
      }

      .preview-card p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.62;
      }

      .yuzhu-site {
        min-height: 720px;
        background:
          radial-gradient(circle at 15% 12%, rgba(0, 153, 255, 0.12), transparent 28%),
          linear-gradient(180deg, #f7fcff 0%, #ffffff 36%, #f8fbff 100%);
        color: #172033;
      }

      .yuzhu-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: clamp(18px, 4vw, 30px);
        border-bottom: 1px solid rgba(23, 32, 51, 0.08);
        background: rgba(255, 255, 255, 0.72);
      }

      .yuzhu-top strong,
      .yuzhu-top span {
        display: block;
      }

      .yuzhu-top strong {
        font-size: 1.18rem;
      }

      .yuzhu-top span,
      .yuzhu-top nav {
        color: #607084;
        line-height: 1.5;
      }

      .yuzhu-hero {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 28px;
        align-items: center;
        padding: clamp(36px, 8vw, 86px);
      }

      .yuzhu-avatar {
        display: grid;
        width: 120px;
        height: 120px;
        place-items: center;
        border: 5px solid #ffffff;
        border-radius: 50%;
        background: linear-gradient(135deg, #09a3ff, #68d8ff);
        color: #ffffff;
        font-size: 3.4rem;
        font-weight: 900;
        box-shadow: 0 20px 42px rgba(0, 153, 255, 0.24);
      }

      .yuzhu-kicker {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: 8px;
        background: rgba(0, 153, 255, 0.12);
        color: #0077c8;
        font-size: 0.82rem;
        font-weight: 850;
      }

      .yuzhu-hero h2 {
        margin-top: 12px;
        font-size: clamp(2.5rem, 7vw, 6rem);
        line-height: 0.96;
      }

      .yuzhu-hero p,
      .yuzhu-section p,
      .yuzhu-contact p {
        margin-top: 14px;
        color: #526174;
        font-size: 1.06rem;
        line-height: 1.75;
      }

      .yuzhu-button {
        width: fit-content;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        margin-top: 20px;
        padding: 0 16px;
        border-radius: 8px;
        background: #09a3ff;
        color: #ffffff;
        font-weight: 850;
      }

      .yuzhu-section,
      .yuzhu-contact {
        padding: clamp(30px, 6vw, 64px);
        border-top: 1px solid rgba(23, 32, 51, 0.08);
      }

      .yuzhu-section h3,
      .yuzhu-contact h3 {
        font-size: clamp(1.7rem, 4vw, 3.2rem);
      }

      .yuzhu-section-note {
        margin: 0 0 10px;
        color: #7a8798;
      }

      .yuzhu-card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 20px;
      }

      .yuzhu-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .yuzhu-skills span {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        padding: 0 11px;
        border-radius: 8px;
        background: rgba(0, 153, 255, 0.1);
        color: #0077c8;
        font-size: 0.88rem;
        font-weight: 850;
      }

      .choice-area {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
        gap: 18px;
        margin-top: 22px;
      }

      .choice-list {
        display: grid;
        gap: 10px;
      }

      .choice-row {
        width: 100%;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 14px;
        border: 1px solid rgba(31, 45, 64, 0.1);
        border-radius: 8px;
        background: #f8fbfd;
        color: inherit;
        text-align: left;
      }

      .choice-row b {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 8px;
        background: var(--accent, #1769c2);
        color: #ffffff;
      }

      .choice-row strong {
        display: block;
      }

      .choice-row p {
        margin-top: 6px;
        color: #526174;
        line-height: 1.55;
      }

      .result-box {
        min-height: 210px;
        padding: 20px;
        border: 1px solid color-mix(in srgb, var(--accent, #1769c2) 24%, #ffffff);
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #1769c2) 8%, #ffffff);
      }

      .result-box strong {
        display: block;
        color: #172033;
        font-size: 1.26rem;
      }

      .result-box p {
        margin-top: 10px;
        color: #526174;
        line-height: 1.66;
      }

      .result-actions {
        margin-top: 16px;
      }

      @supports not (color: color-mix(in srgb, #000 10%, #fff)) {
        .preview-kicker,
        .result-box {
          background: #eef7ff;
        }
      }

      @media (max-width: 860px) {
        .demo-head,
        .choice-area,
        .preview-grid,
        .yuzhu-card-grid {
          grid-template-columns: 1fr;
        }

        .status-box {
          max-width: none;
        }

        .yuzhu-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .yuzhu-hero {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .topbar,
        .top-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }

        .preview-hero,
        .preview-section,
        .yuzhu-hero,
        .yuzhu-section,
        .yuzhu-contact {
          padding: 24px;
        }
      }
    </style>
  </head>

          choices: [
            { title: '香薰礼盒', meta: '200 元内 / 朋友', note: '适合乔迁或生日，不太挑尺码。' },
            { title: '桌面小音箱', meta: '300 元内 / 同事', note: '实用但不太私人，适合感谢礼。' },
            { title: '手写卡片 + 鲜花', meta: '150 元内 / 重要关系', note: '情绪价值高，适合纪念日。' }
          ],
          resultTitle: '推荐：香薰礼盒',
          resultReason: '预算可控、场景通用，也不需要知道太多私人信息，踩雷概率低。'
        },
        'choice-tool-2': {
          title: '旅行路线抽签器',
          subtitle: '输入天数、预算和旅行风格后，先给一条轻量路线灵感。',
          primary: '抽一条路线',
          color: '#1d6fae',
          kicker: '旅行小工具',
          question: '这次可以去哪儿？',
          choices: [
            { title: '杭州两日慢逛', meta: '2 天 / 轻松', note: '西湖、茶馆、城市散步，适合不赶路。' },
            { title: '厦门三日海边', meta: '3 天 / 拍照', note: '海边、老街和咖啡店，适合朋友出游。' },
            { title: '成都周末吃喝', meta: '2 天 / 美食', note: '火锅、小吃和公园，预算弹性大。' }
          ],
          resultTitle: '推荐：杭州两日慢逛',
          resultReason: '行程轻、不用做太多攻略，适合先把周末旅行跑起来。'
        }
      };

      const params = new URLSearchParams(window.location.search);
      const projectId = packCatalog[params.get('project')] ? params.get('project') : 'portfolio-page';
      const packIndex = Math.min(Math.max(Number(params.get('pack') || 0), 0), packCatalog[projectId].length - 1);
      const mode = params.get('mode') === 'mine' ? 'mine' : 'sample';
      const pack = packCatalog[projectId][packIndex];
      const storageVersion = 'direct-yuzhu-site-v2';
      const storageKey = `remix-editor-${storageVersion}-${projectId}-${packIndex}`;
      const sampleData = clone(sampleDefaults[`${projectId}-${packIndex}`]);
      const hasSaved = Boolean(localStorage.getItem(storageKey));
      const data = mode === 'mine' ? loadMineData(sampleData) : sampleData;
      const demoRoot = document.getElementById('demoRoot');
      const editUrl = `./remix-editor.html?project=${projectId}&pack=${packIndex}`;
      const sampleUrl =
        sourceDemoUrls[projectId] || `./remix-demo.html?project=${projectId}&pack=${packIndex}&mode=sample`;

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function loadMineData(base) {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
          if (!saved || typeof saved !== 'object') return base;
          return {
            ...base,
            ...saved,
            cards: saved.cards || base.cards,
            choices: saved.choices || base.choices,
            friends: saved.friends || base.friends
          };
        } catch (error) {
          return base;
        }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function safeColor(value) {
        return /^#[0-9a-fA-F]{6}$/.test(String(value || '')) ? value : '#1769c2';
      }

      function isYuzhuPack() {
        return projectId === 'portfolio-page' && packIndex === 0;
      }

      function cardHtml(items) {
        return items
          .map(
            (item) => `
              <article class="preview-card">
                <strong>${escapeHtml(item.title)}</strong>
                <span>${escapeHtml(item.meta)}</span>
                <p>${escapeHtml(item.note)}</p>
              </article>
            `
          )
          .join('');
      }

      function renderListPage() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <span class="preview-cta">${escapeHtml(data.primary)}</span>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.sectionTitle)}</h3>
            <div class="preview-grid">${cardHtml(data.cards)}</div>
          </section>
        `;
      }

      function chipsHtml(text) {
        return String(text || '')
          .split('/')
          .map((item) => item.trim())
          .filter(Boolean)
          .map((item) => `<span>${escapeHtml(item)}</span>`)
          .join('');
      }

      function renderYuzhuPage() {
        return `
          <div class="yuzhu-site">
            <header class="yuzhu-top">
              <div>
                <strong>${escapeHtml(data.title)}</strong>
                <span>${escapeHtml(data.subtitle)}</span>
              </div>
              <nav>首页 · 介绍 · 项目 · 友链 · 联系我</nav>
            </header>
            <section class="yuzhu-hero">
              <div class="yuzhu-avatar">雨</div>
              <div>
                <span class="yuzhu-kicker">${escapeHtml(data.kicker)}</span>
                <h2>${escapeHtml(data.title)}</h2>
                <p>${escapeHtml(data.intro)}</p>
                <a class="yuzhu-button" href="#contact">${escapeHtml(data.primary)}</a>
              </div>
            </section>
            <section class="yuzhu-section">
              <p class="yuzhu-section-note">学任何东西最有成就感的时刻，莫过于自己的作品得到他人认可。</p>
              <h3>${escapeHtml(data.sectionTitle)}</h3>
              <div class="yuzhu-card-grid">${cardHtml(data.cards)}</div>
            </section>
            <section class="yuzhu-section yuzhu-about">
              <h3>自我介绍</h3>
              <p>${escapeHtml(data.intro)}</p>
              <div class="yuzhu-skills">${chipsHtml(data.skillsText)}</div>
            </section>
            <section class="yuzhu-section">
              <h3>我的小伙伴们</h3>
              <p class="yuzhu-section-note">开发和学习路上，ta 们陪我一同前行。</p>
              <div class="yuzhu-card-grid">${cardHtml(data.friends)}</div>
            </section>
            <section class="yuzhu-contact" id="contact">
              <h3>${escapeHtml(data.contactTitle)}</h3>
              <p>${escapeHtml(data.contactNote)}</p>
            </section>
          </div>
        `;
      }

      function renderChoicePage() {
        return `
          <div class="preview-hero">
            <span class="preview-kicker">${escapeHtml(data.kicker)}</span>
            <h2>${escapeHtml(data.title)}</h2>
            <p>${escapeHtml(data.subtitle)}</p>
            <button class="preview-cta" type="button" data-random>${escapeHtml(data.primary)}</button>
          </div>
          <section class="preview-section">
            <h3>${escapeHtml(data.question)}</h3>
            <div class="choice-area">
              <div class="choice-list">
                ${data.choices
                  .map(
                    (item, index) => `
                      <button class="choice-row" type="button" data-choice="${index}">
                        <b>${index + 1}</b>
                        <div>
                          <strong>${escapeHtml(item.title)}</strong>
                          <p>${escapeHtml(item.meta)} · ${escapeHtml(item.note)}</p>
                        </div>
                      </button>
                    `
                  )
                  .join('')}
              </div>
              <div class="result-box">
                <strong id="resultTitle">${escapeHtml(data.resultTitle)}</strong>
                <p id="resultReason">${escapeHtml(data.resultReason)}</p>
                <div class="result-actions">
                  <button class="choice-action" type="button" data-random>换一个推荐</button>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function showChoice(index) {
        const choice = data.choices[index] || data.choices[0];
        document.getElementById('resultTitle').textContent = `推荐：${choice.title}`;
        document.getElementById('resultReason').textContent = choice.note;
      }

      const sampleLink = document.getElementById('sampleLink');
      sampleLink.href = sampleUrl;
      if (sourceDemoUrls[projectId]) {
        sampleLink.target = '_blank';
        sampleLink.rel = 'noreferrer';
      }
      document.getElementById('editLink').href = editUrl;
      document.getElementById('modeLabel').textContent = mode === 'mine' ? '我的前端' : '示例前端';
      document.getElementById('demoTitle').textContent =
        mode === 'mine' ? `我的版本：${pack.title}` : `示例：${pack.title}`;
      document.getElementById('demoNote').textContent =
        mode === 'mine'
          ? '这里会显示你在编辑页保存过的内容。'
          : '这是这个改造方向先给出的前端样子。';
      document.getElementById('statusBox').textContent =
        mode === 'mine' && !hasSaved
          ? '你还没有保存过自己的内容。现在先显示示例内容，点“修改这个页面”后就能改成你的版本。'
          : `${projectNames[projectId]} · 第 ${packIndex + 1} 个改法`;

      demoRoot.style.setProperty('--accent', safeColor(data.color));
      demoRoot.innerHTML = isYuzhuPack()
        ? renderYuzhuPage()
        : pack.kind === 'choice'
          ? renderChoicePage()
          : renderListPage();

      demoRoot.addEventListener('click', (event) => {
        const choiceButton = event.target.closest('[data-choice]');
        if (choiceButton) {
          showChoice(Number(choiceButton.dataset.choice));
          return;
        }
        if (event.target.closest('[data-random]')) {
          showChoice(Math.floor(Math.random() * data.choices.length));
        }
      });
    </script>
  </body>
</html>
